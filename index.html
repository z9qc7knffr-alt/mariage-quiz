<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Mariage</title>
  <script src="./config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #1d1d1f;
      --gold:    #c9a227;
      --gold2:   #e8cf6e;
      --gray1:   #fdfaf2;
      --gray2:   #ece3c8;
      --gray3:   #8a8a86;
      --gray4:   #c9c4b4;
      --accent:  #c9a227;
      --accent2: #a9851d;
      --green:   #1d8a4a;
      --red:     #c0392b;
      --radius:  14px;
    }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: #fff;
      color: var(--black);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; padding: 0 20px 60px;
    }

    .top-bar {
      width: 100%; max-width: 560px;
      display: flex; justify-content: center;
      padding: 28px 0 0;
    }
    .monogram {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #fff; letter-spacing: -0.5px; font-weight: 500;
    }

    .content { width: 100%; max-width: 400px; }

    /* ── Écran login ── */
    #screen-login { margin-top: 60px; }

    .eyebrow {
      font-size: 13px; font-weight: 500; color: var(--gray3);
      letter-spacing: 0.02em; text-align: center; margin-bottom: 8px;
    }
    h1 {
      font-size: 34px; font-weight: 600; letter-spacing: -0.5px;
      text-align: center; line-height: 1.1; margin-bottom: 40px;
      color: var(--black);
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--gray3); margin-bottom: 6px; letter-spacing: 0.01em;
    }
    .field input {
      width: 100%; height: 50px; padding: 0 16px;
      border: 1.5px solid var(--gray2); border-radius: var(--radius);
      font-size: 17px; color: var(--black);
      background: #fff; outline: none;
      transition: border-color 0.2s;
      -webkit-font-smoothing: antialiased;
      font-family: inherit;
    }
    .field input::placeholder { color: var(--gray4); }
    .field input:focus { border-color: var(--accent); }

    .btn-main {
      width: 100%; height: 50px; border-radius: var(--radius);
      background: var(--gold); color: #fff;
      border: none; font-size: 17px; font-weight: 500;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.15s;
      font-family: inherit; letter-spacing: -0.1px;
    }
    .btn-main:disabled { opacity: 0.35; cursor: default; }
    .btn-main:not(:disabled):active { opacity: 0.75; }

    .error-msg {
      margin-top: 12px; font-size: 13px; color: var(--red);
      text-align: center; min-height: 18px;
    }

    /* ── Écran attente ── */
    #screen-wait { display: none; margin-top: 80px; text-align: center; }
    .wait-greeting {
      font-size: 28px; font-weight: 600; letter-spacing: -0.3px;
      margin-bottom: 12px;
    }
    .wait-sub { font-size: 15px; color: var(--gray3); line-height: 1.5; }
    .pulse-ring {
      width: 60px; height: 60px; border-radius: 50%;
      border: 1.5px solid var(--gray2);
      margin: 40px auto 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.12);opacity:.5} }

    /* ── Écran question ── */
    #screen-question { display: none; margin-top: 32px; }

    .q-progress {
      display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
    }
    .q-progress-track {
      flex: 1; height: 3px; background: var(--gray2); border-radius: 2px; overflow: hidden;
    }
    .q-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .q-progress-label {
      font-size: 13px; color: var(--gray3); font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .q-timer {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: var(--black);
      font-variant-numeric: tabular-nums; white-space: nowrap;
      padding: 4px 10px; border-radius: 999px;
      background: var(--gray1); border: 1.5px solid var(--gold2);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .q-timer.urgent { background: #fdf0ee; border-color: #e0a194; color: var(--red); }
    .q-timer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
    .q-timer.urgent .q-timer-dot { background: var(--red); }

    .q-text {
      font-size: 22px; font-weight: 600; letter-spacing: -0.3px;
      line-height: 1.3; margin-bottom: 24px; color: var(--black);
    }

    .q-photo {
      width: 100%; max-height: 220px; object-fit: cover;
      border-radius: 12px; margin-bottom: 20px; display: block;
    }
    .q-photo-skeleton {
      width: 100%; height: 160px; border-radius: 12px;
      background: var(--gray2); margin-bottom: 20px;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.45} }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      width: 100%; padding: 14px 16px;
      border: 1.5px solid var(--gray2); border-radius: var(--radius);
      background: #fff; text-align: left;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
    }
    .opt:not(.disabled):hover { border-color: var(--gray3); }
    .opt.selected  { border-color: var(--gold); background: var(--gray1); }
    .opt.correct   { border-color: var(--green); background: #f0fff4; }
    .opt.wrong     { border-color: var(--red);   background: #fff5f5; }
    .opt.disabled  { cursor: default; }

    .opt-letter {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--gray1); border: 1.5px solid var(--gray2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--gray3);
      flex-shrink: 0; transition: all 0.15s;
    }
    .opt.selected  .opt-letter { background: var(--gold); border-color: var(--gold); color: #fff; }
    .opt.correct   .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }
    .opt.wrong     .opt-letter { background: var(--red);   border-color: var(--red);   color: #fff; }

    .opt-text { font-size: 15px; color: var(--black); line-height: 1.4; }

    .btn-validate {
      width: 100%; height: 50px; border-radius: var(--radius);
      background: var(--gold); color: #fff;
      border: none; font-size: 15px; font-weight: 500;
      cursor: pointer; margin-top: 16px;
      transition: opacity 0.15s; font-family: inherit;
    }
    .btn-validate:disabled { opacity: 0.25; cursor: default; }
    .btn-validate:not(:disabled):active { opacity: 0.75; }

    .voted-banner {
      margin-top: 16px; padding: 14px 16px;
      background: var(--gray1); border-radius: var(--radius);
      font-size: 14px; color: var(--gray3); text-align: center;
    }

    /* ── Écran fin ── */
    #screen-done { display: none; margin-top: 60px; text-align: center; }
    .score-display {
      display: inline-flex; align-items: baseline; gap: 4px;
      margin: 24px 0 12px;
    }
    .score-num   { font-size: 80px; font-weight: 700; letter-spacing: -3px; color: var(--gold); line-height: 1; }
    .score-total { font-size: 28px; font-weight: 400; color: var(--gray4); letter-spacing: -0.5px; }
    .score-label { font-size: 15px; color: var(--gray3); margin-bottom: 32px; }
    .done-hint {
      font-size: 13px; color: var(--gray4);
      border-top: 1px solid var(--gray2); padding-top: 20px; margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="top-bar"><div class="monogram">M</div></div>
  <div class="content">

    <!-- LOGIN -->
    <div id="screen-login">
      <div class="eyebrow">Quiz du mariage</div>
      <h1>Bonjour, qui êtes-vous ?</h1>
      <div class="field">
        <label for="login-input">Votre prénom</label>
        <input type="text" id="login-input" placeholder="Marie" maxlength="30" autocomplete="given-name" autocapitalize="words"/>
      </div>
      <button class="btn-main" id="login-btn" onclick="doLogin()">Rejoindre</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- ATTENTE -->
    <div id="screen-wait">
      <div class="eyebrow">Quiz du mariage</div>
      <div class="wait-greeting" id="wait-name"></div>
      <div class="wait-sub">Le quiz va commencer.<br>Gardez cette page ouverte.</div>
      <div class="pulse-ring"></div>
    </div>

    <!-- QUESTION -->
    <div id="screen-question">
      <div class="q-progress">
        <div class="q-progress-track"><div class="q-progress-fill" id="q-fill"></div></div>
        <div class="q-progress-label" id="q-label">1 / 1</div>
        <div class="q-timer" id="q-timer"><span class="q-timer-dot"></span><span id="q-timer-val">20s</span></div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div id="q-photo-wrap"></div>
      <div class="options" id="q-opts"></div>
      <div id="q-action"></div>
    </div>

    <!-- FIN -->
    <div id="screen-done">
      <div class="eyebrow">Votre résultat</div>
      <div class="score-display">
        <span class="score-num" id="final-score">0</span>
        <span class="score-total" id="final-total">/0</span>
      </div>
      <div class="score-label" id="final-msg"></div>
      <div class="done-hint">Le classement va être affiché sur l'écran principal.</div>
    </div>

  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const LETTERS = ["A","B","C","D","E","F"];

let deviceId = localStorage.getItem("mq_device_id");
if (!deviceId) {
  deviceId = "d_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
  localStorage.setItem("mq_device_id", deviceId);
}
let username = localStorage.getItem("mq_username") || null;
let score = 0, totalQ = 0, questionStartTime = null;
let countdownInterval = null;
let timeExpired = false;

function show(id) {
  ["screen-login","screen-wait","screen-question","screen-done"]
    .forEach(s => document.getElementById(s).style.display = s === id ? (id === "screen-question" ? "block" : (id === "screen-login" ? "block" : "block")) : "none");
}

const loginInput = document.getElementById("login-input");
loginInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

window.doLogin = async () => {
  const name = loginInput.value.trim();
  if (name.length < 2) { document.getElementById("login-error").textContent = "Entrez au moins 2 caractères."; return; }
  const btn = document.getElementById("login-btn");
  btn.disabled = true;
  const { error } = await sb.from("quiz_players").upsert(
    { device_id: deviceId, username: name, score: 0 },
    { onConflict: "device_id" }
  );
  if (error) { document.getElementById("login-error").textContent = "Erreur de connexion, réessayez."; btn.disabled = false; return; }
  username = name;
  localStorage.setItem("mq_username", name);
  btn.disabled = false;
  initAfterLogin();
};

async function init() {
  if (username) {
    const { data } = await sb.from("quiz_players").select("username").eq("device_id", deviceId).maybeSingle();
    if (data) { username = data.username; initAfterLogin(); return; }
    username = null;
    localStorage.removeItem("mq_username");
  }
  show("screen-login");
}

async function initAfterLogin() {
  document.getElementById("wait-name").textContent = `Prêt, ${username} !`;
  const { data: player } = await sb.from("quiz_players").select("score").eq("device_id", deviceId).single();
  if (player) score = player.score;
  const { data: state } = await sb.from("quiz_state").select("*").eq("id", 1).single();
  if (state) await handleState(state);
  sb.channel("player_state")
    .on("postgres_changes", { event:"UPDATE", schema:"public", table:"quiz_state", filter:"id=eq.1" }, p => handleState(p.new))
    .subscribe();
}

async function handleState(state) {
  clearInterval(countdownInterval); // toujours nettoyer avant de changer d'écran
  if (state.status === "waiting") { show("screen-wait"); return; }
  if (state.status === "done" || state.status === "podium") { await showDone(); return; }
  if (state.status === "question") await showQuestion(state.current_question_index);
}

async function showQuestion(idx) {
  const { data: qs } = await sb.from("quiz_questions").select("*").order("position");
  if (!qs) return;
  totalQ = qs.length;
  const q = qs[idx];
  if (!q) return;

  const { data: state } = await sb.from("quiz_state")
    .select("question_started_at, question_duration_sec").eq("id", 1).single();

  const { data: existing } = await sb.from("quiz_votes")
    .select("answer_index, is_correct").eq("question_id", q.id).eq("device_id", deviceId).maybeSingle();

  show("screen-question");   // rendre visible AVANT d'assigner img.src
  renderQuestion(q, idx, existing, state);
}

function renderQuestion(q, idx, existing, state) {
  // Démarrer le chrono local (pour mesurer le temps de réponse) seulement si pas encore voté
  if (!existing) questionStartTime = Date.now();
  timeExpired = false;
  const voted = !!existing;
  const myVote = existing?.answer_index ?? null;
  const wasCorrect = existing?.is_correct ?? false;
  const correct = q.correct_answer_index;

  const pct = totalQ > 0 ? Math.round((idx + 1) / totalQ * 100) : 0;
  document.getElementById("q-fill").style.width  = pct + "%";
  document.getElementById("q-label").textContent = `${idx + 1} / ${totalQ}`;
  document.getElementById("q-text").textContent  = q.text;

  // Photo optionnelle
  const photoWrap = document.getElementById("q-photo-wrap");
  if (q.photo_url) {
    photoWrap.innerHTML = `<div class="q-photo-skeleton" id="q-photo-skeleton"></div>`;
    const img = new Image();
    img.className = "q-photo";
    img.alt       = "illustration de la question";
    img.onload  = () => { const sk = document.getElementById("q-photo-skeleton"); if (sk) sk.replaceWith(img); };
    img.onerror = () => { photoWrap.innerHTML = ""; };
    img.src = q.photo_url;
  } else {
    photoWrap.innerHTML = "";
  }

  // ── Décompte synchronisé ──────────────────────────────────────
  clearInterval(countdownInterval);
  const durationSec = state?.question_duration_sec || 20;
  const startedAt    = state?.question_started_at ? new Date(state.question_started_at).getTime() : Date.now();

  function tick() {
    const elapsed   = (Date.now() - startedAt) / 1000;
    const remaining = Math.max(0, Math.ceil(durationSec - elapsed));
    const timerEl   = document.getElementById("q-timer");
    const timerVal  = document.getElementById("q-timer-val");
    if (timerVal) timerVal.textContent = remaining + "s";
    if (timerEl)  timerEl.classList.toggle("urgent", remaining <= 5);

    if (remaining <= 0) {
      clearInterval(countdownInterval);
      if (!voted && !timeExpired) {
        timeExpired = true;
        handleTimeExpired(q, idx);
      }
    }
  }
  if (!voted) { tick(); countdownInterval = setInterval(tick, 250); }
  else {
    // Question déjà répondue : afficher le temps figé à 0 ou masquer le timer
    const timerEl = document.getElementById("q-timer");
    if (timerEl) timerEl.style.display = "none";
  }
  if (!voted) document.getElementById("q-timer").style.display = "flex";

  const opts = document.getElementById("q-opts");
  let selected = voted ? myVote : null;

  opts.innerHTML = "";
  q.options.forEach((o, i) => {
    const btn = document.createElement("button");
    let cls = "opt";
    if (voted) {
      cls += " disabled";
      if (i === myVote) cls += " selected"; // on indique juste ce qui a été choisi, pas si c'est juste
    } else if (i === selected) cls += " selected";
    btn.className = cls;
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text">${o}</span>`;
    if (!voted) {
      btn.addEventListener("click", () => {
        selected = i;
        opts.querySelectorAll(".opt").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        document.getElementById("q-validate")?.removeAttribute("disabled");
      });
    }
    opts.appendChild(btn);
  });

  const action = document.getElementById("q-action");
  if (voted) {
    action.innerHTML = `<div class="voted-banner">Réponse envoyée — résultat affiché sur l'écran principal</div>`;
  } else {
    action.innerHTML = `<button class="btn-validate" id="q-validate" disabled onclick="submitVote(${q.id},${correct})">Valider</button>`;
    const vBtn = document.getElementById("q-validate");
    // Réactiver si sélection déjà faite
    if (selected !== null) vBtn.removeAttribute("disabled");
    // Passer la sélection courante via closure
    window._currentSelected = () => selected;
  }
}

async function handleTimeExpired(q, idx) {
  // Désactiver les options et le bouton Valider
  document.querySelectorAll("#q-opts .opt").forEach(b => b.classList.add("disabled"));
  const vBtn = document.getElementById("q-validate");
  if (vBtn) vBtn.disabled = true;

  // Enregistrer un vote "temps écoulé" : answer_index = -1, toujours faux, 0 point
  const responseTimeMs = questionStartTime ? (Date.now() - questionStartTime) : 0;
  const { error } = await sb.from("quiz_votes").insert({
    question_id: q.id, device_id: deviceId, username,
    answer_index: -1, is_correct: false, response_time_ms: responseTimeMs
  });
  if (error && error.code !== "23505") return; // déjà voté entre-temps, on ignore

  const action = document.getElementById("q-action");
  if (action) action.innerHTML = `<div class="voted-banner">Temps écoulé — réponse non envoyée</div>`;
}

window.submitVote = async (qId, correctIdx) => {
  clearInterval(countdownInterval);
  const selected = window._currentSelected?.();
  if (selected === null || selected === undefined) return;
  const btn = document.getElementById("q-validate");
  if (btn) btn.disabled = true;

  // Calcul du temps de réponse
  const responseTimeMs = questionStartTime ? (Date.now() - questionStartTime) : 0;

  const isCorrect = selected === correctIdx;
  const { error } = await sb.from("quiz_votes").insert({
    question_id:     qId,
    device_id:       deviceId,
    username,
    answer_index:    selected,
    is_correct:      isCorrect,
    response_time_ms: responseTimeMs
  });
  if (error && error.code !== "23505") { if (btn) btn.disabled = false; return; }

  if (isCorrect) {
    score++;
    // On relit total_time_ms existant pour l'incrémenter côté client
    const { data: player } = await sb.from("quiz_players")
      .select("total_time_ms")
      .eq("device_id", deviceId)
      .single();
    const newTotalTime = (player?.total_time_ms || 0) + responseTimeMs;
    await sb.from("quiz_players")
      .update({ score, total_time_ms: newTotalTime })
      .eq("device_id", deviceId);
  }

  // Recharger la question pour afficher le résultat
  const { data: q } = await sb.from("quiz_questions").select("*").eq("id", qId).single();
  const { data: state } = await sb.from("quiz_state").select("current_question_index").eq("id", 1).single();
  if (q && state) renderQuestion(q, state.current_question_index, { answer_index: selected, is_correct: isCorrect });
};

async function showDone() {
  const { data: player } = await sb.from("quiz_players").select("score").eq("device_id", deviceId).single();
  if (player) score = player.score;
  const { data: qs } = await sb.from("quiz_questions").select("id");
  const total = qs?.length ?? totalQ;
  document.getElementById("final-score").textContent = score;
  document.getElementById("final-total").textContent = "/" + total;
  const pct = total > 0 ? Math.round(score / total * 100) : 0;
  const msgs = [[100,"Résultat parfait."],[70,"Excellent résultat."],[40,"Bon résultat."],[0,"Merci d'avoir joué."]];
  document.getElementById("final-msg").textContent = msgs.find(([t]) => pct >= t)[1];
  show("screen-done");
}

init();
</script>
</body>
</html>
