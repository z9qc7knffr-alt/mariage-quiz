<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Quiz Mariage 💍</title>
  <script src="./config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a0d2e;
      --surface:  #2d1a4e;
      --surface2: #3d2060;
      --border:   #4a2878;
      --purple:   #7c3aed;
      --purple-lt:#c084fc;
      --text:     #f0e8ff;
      --muted:    #b08abb;
      --faint:    #8a7090;
      --green:    #16a34a;
      --gold:     #f59e0b;
    }

    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Onglets ── */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 0; z-index: 10;
    }
    .tab-btn {
      padding: 1rem 1.4rem; font-size: .88rem; font-weight: 600;
      background: none; border: none; color: var(--muted);
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--purple-lt); border-bottom-color: var(--purple-lt); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-pane { display: none; padding: 2rem; max-width: 860px; margin: 0 auto; }
    .tab-pane.active { display: block; }

    /* ── Boutons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1.1rem; border-radius: 8px; border: none;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: filter .15s, opacity .15s; white-space: nowrap;
    }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn:not(:disabled):hover { filter: brightness(1.12); }
    .btn-purple  { background: var(--purple);  color: #fff; }
    .btn-green   { background: var(--green);   color: #fff; }
    .btn-gray    { background: #374151;        color: #fff; }
    .btn-red     { background: #b91c1c;        color: #fff; }
    .btn-gold    { background: var(--gold);    color: #1c1000; }
    .btn-outline {
      background: transparent; color: var(--purple-lt);
      border: 1px solid var(--border);
    }
    .btn-outline:not(:disabled):hover { background: var(--surface); }

    /* ── Inputs ── */
    input[type=text], textarea, select {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: .55rem .75rem;
      color: var(--text); font-size: .9rem; width: 100%; font-family: inherit;
    }
    input[type=text]:focus, textarea:focus, select:focus { outline: none; border-color: var(--purple); }
    textarea { resize: vertical; min-height: 56px; line-height: 1.5; }
    select option { background: #2d1a4e; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #1c3a2a; color: #86efac;
      border: 1px solid #166534; border-radius: 10px;
      padding: .75rem 1.25rem; font-size: .9rem; font-weight: 600;
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { background: #3a1c1c; color: #fca5a5; border-color: #7f1d1d; }

    /* ════ ÉDITEUR ════ */
    .toolbar {
      display: flex; gap: .5rem; flex-wrap: wrap;
      align-items: center; margin-bottom: 1.5rem;
    }
    .toolbar-sep { flex: 1; }

    .q-card-edit {
      background: var(--surface); border-radius: 14px;
      border: 1px solid var(--border); margin-bottom: 1rem; overflow: hidden;
    }
    .q-card-head {
      display: flex; align-items: center; gap: .75rem;
      padding: .75rem 1rem; background: var(--surface2);
      cursor: pointer; user-select: none;
    }
    .q-card-head:hover { background: #4a2878; }
    .q-num-badge {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--purple); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; flex-shrink: 0;
    }
    .q-card-title { flex: 1; font-size: .95rem; font-weight: 500; }
    .q-card-title.placeholder { color: var(--faint); font-style: italic; }
    .chevron { font-size: .75rem; color: var(--muted); transition: transform .2s; }
    .q-card-edit.collapsed .chevron { transform: rotate(-90deg); }
    .q-card-body { padding: 1rem; display: flex; flex-direction: column; gap: .9rem; }
    .q-card-edit.collapsed .q-card-body { display: none; }

    .field-label {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: .3rem;
    }

    /* Options avec bouton "bonne réponse" */
    .opt-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; }
    .opt-badge {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--surface2); color: var(--purple-lt);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; flex-shrink: 0;
    }
    .correct-btn {
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      border: 1.5px solid var(--border); background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: background .15s, border-color .15s;
      title: "Marquer comme bonne réponse";
    }
    .correct-btn.active { background: #14532d; border-color: #16a34a; }
    .correct-btn:not(.active):hover { border-color: var(--purple); }
    .icon-btn {
      background: none; border: none; cursor: pointer; padding: .2rem;
      color: var(--faint); font-size: 1rem; transition: color .15s; flex-shrink: 0;
    }
    .icon-btn:hover { color: #ef4444; }
    .add-opt-btn {
      background: none; border: 1px dashed var(--border); color: var(--muted);
      border-radius: 7px; padding: .3rem .75rem; font-size: .82rem;
      cursor: pointer; width: 100%; margin-top: .2rem;
      transition: border-color .15s, color .15s;
    }
    .add-opt-btn:hover { border-color: var(--purple); color: var(--purple-lt); }

    .correct-hint {
      font-size: .78rem; color: #4ade80; margin-top: .1rem;
      display: flex; align-items: center; gap: .3rem;
    }

    .q-card-footer {
      display: flex; gap: .5rem; justify-content: flex-end;
      padding-top: .6rem; border-top: 1px solid var(--border);
    }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--faint); }
    .empty-state .big { font-size: 2.5rem; margin-bottom: .75rem; }

    /* Modal import */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border-radius: 16px;
      border: 1px solid var(--border);
      padding: 1.5rem; width: 100%; max-width: 560px;
    }
    .modal h3 { font-size: 1rem; font-weight: 600; color: var(--purple-lt); margin-bottom: .5rem; }
    .modal p  { font-size: .85rem; color: var(--muted); margin-bottom: .75rem; line-height: 1.5; }
    .modal textarea { font-family: monospace; font-size: .82rem; min-height: 180px; }
    .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }

    /* ════ DASHBOARD ════ */
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .4rem 1rem; border-radius: 999px;
      font-size: .85rem; font-weight: 600;
    }
    .pill-waiting { background: #3d2060; color: #c4a0e8; }
    .pill-live    { background: #14532d; color: #86efac; }
    .pill-done    { background: #1e3a5f; color: #93c5fd; }
    .pill-podium  { background: #5c3a00; color: #fde68a; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .dot.blink { animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    .controls { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1.5rem; }

    .q-nav { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .q-nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      color: var(--muted); font-weight: 600; cursor: pointer;
      transition: all .15s; font-size: .82rem;
    }
    .q-nav-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }
    .q-nav-btn:hover:not(.active) { border-color: var(--purple); color: var(--purple-lt); }

    .result-card {
      background: var(--surface); border-radius: 14px;
      border: 1px solid var(--border);
      padding: 1.25rem; margin-bottom: 1rem;
    }
    .result-card.is-live { border-color: var(--green); }
    .r-label { font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .35rem; }
    .live-badge-sm {
      display: inline-block; font-size: .68rem; font-weight: 700;
      background: #14532d; color: #86efac; padding: .1rem .45rem;
      border-radius: 999px; margin-left: .4rem; vertical-align: middle;
    }
    .r-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; line-height: 1.4; }
    .r-rows { display: flex; flex-direction: column; gap: .55rem; }
    .r-row  { display: flex; flex-direction: column; gap: .2rem; }
    .r-top  { display: flex; justify-content: space-between; align-items: center; }
    .r-opt  { font-size: .9rem; color: #e2d9f0; display: flex; align-items: center; gap: .4rem; }
    .r-correct-tag {
      font-size: .68rem; font-weight: 700; background: #14532d;
      color: #86efac; padding: .1rem .4rem; border-radius: 4px;
    }
    .r-pct  { font-size: .92rem; font-weight: 700; color: var(--purple-lt); }
    .r-cnt  { font-size: .78rem; color: var(--faint); margin-left: .2rem; }
    .bar-wrap { height: 8px; background: var(--surface2); border-radius: 4px; }
    .bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--purple), var(--purple-lt));
      transition: width .45s ease;
    }
    .bar-fill.correct-bar { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .r-footer { margin-top: .75rem; font-size: .8rem; color: var(--faint); text-align: right; }

    /* ── Encart classement live ── */
    .ranking-panel {
      background: var(--surface); border-radius: 14px;
      border: 1px solid var(--border); padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .ranking-panel-title {
      font-size: .75rem; font-weight: 700; color: var(--gold);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: .75rem;
    }
    .mini-rank-list { display: flex; flex-direction: column; gap: .4rem; }
    .mini-rank-row {
      display: flex; align-items: center; gap: .6rem;
      padding: .45rem .75rem; background: rgba(255,255,255,.04);
      border-radius: 8px;
    }
    .mini-rank-pos { width: 22px; font-size: .82rem; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .mini-rank-pos.gold   { color: var(--gold); }
    .mini-rank-pos.silver { color: #94a3b8; }
    .mini-rank-pos.bronze { color: #b45309; }
    .mini-rank-name { flex: 1; font-size: .9rem; }
    .mini-rank-score { font-size: .9rem; font-weight: 700; color: var(--purple-lt); }

    .dash-empty { text-align: center; padding: 3rem 1rem; color: var(--faint); }
  </style>
</head>
<body>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('editor')">✏️ Questions</button>
  <button class="tab-btn"        onclick="switchTab('dashboard')">📊 Dashboard</button>
</nav>

<!-- ════ ÉDITEUR ════ -->
<div id="tab-editor" class="tab-pane active">
  <div class="toolbar">
    <button class="btn btn-purple"  onclick="addQuestion()">＋ Ajouter une question</button>
    <button class="btn btn-outline" onclick="exportJSON()">⬇ Exporter JSON</button>
    <button class="btn btn-outline" onclick="openImport()">⬆ Importer JSON</button>
    <div class="toolbar-sep"></div>
    <button class="btn btn-green"   onclick="saveToSupabase()">💾 Enregistrer dans Supabase</button>
  </div>
  <div id="editor-list"></div>
</div>

<!-- ════ DASHBOARD ════ -->
<div id="tab-dashboard" class="tab-pane">

  <div class="dash-header">
    <div>
      <div style="font-size:1.2rem;font-weight:600">💍 Quiz en direct</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:.2rem">Résultats mis à jour en temps réel</div>
    </div>
    <span id="status-pill" class="status-pill pill-waiting">
      <span class="dot"></span>
      <span id="status-text">En attente</span>
    </span>
  </div>

  <div class="controls">
    <button class="btn btn-green"   id="btn-start"  onclick="startQuiz()">▶ Lancer</button>
    <button class="btn btn-purple"  id="btn-next"   onclick="nextQuestion()" disabled>⏭ Suivante</button>
    <button class="btn btn-red"     id="btn-end"    onclick="endQuiz()"      disabled>⏹ Terminer</button>
    <button class="btn btn-gold"    id="btn-podium" onclick="showPodium()"   disabled>🏆 Afficher le podium</button>
    <button class="btn btn-gray"    id="btn-reset"  onclick="resetQuiz()">🔄 Reset</button>
  </div>

  <!-- Classement live -->
  <div class="ranking-panel">
    <div class="ranking-panel-title">🏆 Classement en cours</div>
    <div class="mini-rank-list" id="mini-ranking">
      <div style="color:var(--faint);font-size:.88rem">Aucun participant pour l'instant…</div>
    </div>
  </div>

  <div class="q-nav" id="q-nav"></div>
  <div id="results-container"><div class="dash-empty">Chargement…</div></div>

</div>

<!-- Modal import -->
<div id="import-modal" class="modal-overlay hidden">
  <div class="modal">
    <h3>⬆ Importer un JSON</h3>
    <p>Format attendu : <code style="color:#c084fc">[{"text":"…","options":["A","B","C"],"correct_answer_index":0}, …]</code></p>
    <textarea id="import-textarea" placeholder='[{"text":"Où se sont-ils rencontrés ?","options":["À l'\''école","Au travail","En vacances"],"correct_answer_index":1}]'></textarea>
    <div class="modal-actions">
      <button class="btn btn-gray"   onclick="closeImport()">Annuler</button>
      <button class="btn btn-purple" onclick="doImport()">Importer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON;

if (!SUPABASE_URL || SUPABASE_URL.includes("XXXXXXXX")) {
  document.body.innerHTML = `<div style="font-family:system-ui;padding:2rem;color:#fca5a5;background:#1a0d2e;min-height:100vh">
    <h2>⚠️ config.js non configuré</h2>
    <p style="margin-top:1rem">Copiez <code>config.example.js</code> en <code>config.js</code> et renseignez vos clés Supabase.</p>
  </div>`;
  throw new Error("config.js manquant ou non configuré");
}

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const LETTERS = ["A","B","C","D","E","F"];

let questions   = [];
let currentIdx  = -1;
let voteCounts  = {};
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ════════ ONGLETS ════════
window.switchTab = name => {
  document.querySelectorAll(".tab-btn").forEach((b,i) =>
    b.classList.toggle("active", ["editor","dashboard"][i] === name));
  document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
};

// ════════ TOAST ════════
let toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show" + (isError ? " error" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "", 3000);
}

// ════════ SYNC DOM → questions[] ════════
function syncFromDOM() {
  questions.forEach((q, i) => {
    const ta = document.getElementById(`qtxt-${i}`);
    if (ta) q.text = ta.value;
    q.options.forEach((_, j) => {
      const inp = document.querySelector(`#opts-${i} .opt-row:nth-child(${j+1}) input[type=text]`);
      if (inp) q.options[j] = inp.value;
    });
  });
}

// ════════ ÉDITEUR ════════
window.addQuestion = () => {
  syncFromDOM();
  questions.push({ text: "", options: ["", ""], correct_answer_index: 0, position: questions.length });
  renderEditor();
  setTimeout(() => {
    document.querySelectorAll(".q-card-edit").at(-1)?.scrollIntoView({ behavior: "smooth", block: "start" });
  }, 50);
};

window.removeQuestion = i => {
  if (!confirm(`Supprimer la question ${i+1} ?`)) return;
  syncFromDOM(); questions.splice(i, 1); renderEditor();
};

window.addOption = i => {
  if (questions[i].options.length >= 6) return;
  syncFromDOM(); questions[i].options.push(""); renderEditor();
};

window.removeOption = (qi, oi) => {
  if (questions[qi].options.length <= 2) return;
  syncFromDOM();
  questions[qi].options.splice(oi, 1);
  // Ajuster correct_answer_index si nécessaire
  if (questions[qi].correct_answer_index >= questions[qi].options.length)
    questions[qi].correct_answer_index = questions[qi].options.length - 1;
  renderEditor();
};

window.setCorrect = (qi, oi) => {
  syncFromDOM();
  questions[qi].correct_answer_index = oi;
  // Mettre à jour visuellement sans re-render complet
  const card = document.getElementById(`qcard-${qi}`);
  card.querySelectorAll(".correct-btn").forEach((btn, j) => {
    btn.classList.toggle("active", j === oi);
    btn.title = j === oi ? "✅ Bonne réponse" : "Marquer comme bonne réponse";
  });
  const hint = document.getElementById(`correct-hint-${qi}`);
  if (hint) hint.textContent = `✅ Bonne réponse : ${LETTERS[oi]}`;
};

window.toggleCard = i => document.getElementById(`qcard-${i}`).classList.toggle("collapsed");
window.moveUp     = i => { if (!i) return; syncFromDOM(); [questions[i-1],questions[i]]=[questions[i],questions[i-1]]; renderEditor(); };
window.moveDown   = i => { if (i>=questions.length-1) return; syncFromDOM(); [questions[i],questions[i+1]]=[questions[i+1],questions[i]]; renderEditor(); };

window.updateCardTitle = i => {
  const el = document.querySelector(`#qcard-${i} .q-card-title`);
  if (!el) return;
  const txt = questions[i].text.trim();
  el.textContent = txt || "Nouvelle question…";
  el.className = "q-card-title" + (txt ? "" : " placeholder");
};

function renderEditor() {
  const list = document.getElementById("editor-list");
  if (!questions.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">✏️</div>
      <p>Aucune question.<br>Cliquez sur <strong>＋ Ajouter une question</strong>.</p></div>`;
    return;
  }
  list.innerHTML = questions.map((q, i) => {
    const hasTitle = q.text.trim().length > 0;
    return `
    <div class="q-card-edit" id="qcard-${i}">
      <div class="q-card-head" onclick="toggleCard(${i})">
        <div class="q-num-badge">${i+1}</div>
        <div class="q-card-title ${hasTitle ? "" : "placeholder"}">
          ${hasTitle ? esc(q.text) : "Nouvelle question…"}</div>
        <span class="chevron">▼</span>
      </div>
      <div class="q-card-body">
        <div>
          <div class="field-label">Question</div>
          <textarea id="qtxt-${i}" placeholder="Ex : Où se sont-ils rencontrés ?"
            oninput="questions[${i}].text=this.value;updateCardTitle(${i})"
          >${esc(q.text)}</textarea>
        </div>
        <div>
          <div class="field-label">
            Réponses — cliquez sur ✓ pour marquer la bonne réponse
          </div>
          <div id="opts-${i}">
            ${q.options.map((o, j) => `
              <div class="opt-row">
                <div class="opt-badge">${LETTERS[j]}</div>
                <input type="text" value="${esc(o)}"
                  placeholder="Réponse ${LETTERS[j]}…"
                  oninput="questions[${i}].options[${j}]=this.value" />
                <button class="correct-btn ${q.correct_answer_index===j ? "active":""}"
                  onclick="setCorrect(${i},${j})"
                  title="${q.correct_answer_index===j ? "✅ Bonne réponse" : "Marquer comme bonne réponse"}">✓</button>
                ${q.options.length > 2
                  ? `<button class="icon-btn" onclick="removeOption(${i},${j})">✕</button>`
                  : '<div style="width:26px"></div>'}
              </div>`).join("")}
          </div>
          <div class="correct-hint" id="correct-hint-${i}">
            ✅ Bonne réponse : ${LETTERS[q.correct_answer_index]}
          </div>
          ${q.options.length < 6
            ? `<button class="add-opt-btn" onclick="addOption(${i})">＋ Ajouter une réponse</button>` : ""}
        </div>
        <div class="q-card-footer">
          <button class="btn btn-gray" style="padding:.35rem .7rem;font-size:.8rem"
            onclick="moveUp(${i})" ${!i?"disabled":""}>↑</button>
          <button class="btn btn-gray" style="padding:.35rem .7rem;font-size:.8rem"
            onclick="moveDown(${i})" ${i===questions.length-1?"disabled":""}>↓</button>
          <button class="btn btn-red"  style="padding:.35rem .7rem;font-size:.8rem"
            onclick="removeQuestion(${i})">🗑 Supprimer</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── Export ──
window.exportJSON = () => {
  if (!questions.length) { toast("Aucune question à exporter", true); return; }
  syncFromDOM();
  const data = questions.map(q => ({ text: q.text, options: q.options, correct_answer_index: q.correct_answer_index }));
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"})),
    download: "quiz-mariage.json"
  });
  a.click();
  toast("JSON exporté !");
};

// ── Import ──
window.openImport  = () => document.getElementById("import-modal").classList.remove("hidden");
window.closeImport = () => document.getElementById("import-modal").classList.add("hidden");
window.doImport    = () => {
  const raw = document.getElementById("import-textarea").value.trim();
  try {
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) throw new Error("Doit être un tableau JSON");
    parsed.forEach((q,i) => {
      if (typeof q.text !== "string") throw new Error(`Q${i+1} : "text" manquant`);
      if (!Array.isArray(q.options) || q.options.length < 2) throw new Error(`Q${i+1} : "options" doit avoir ≥ 2 éléments`);
    });
    if (questions.length && !confirm("Remplacer les questions actuelles ?")) return;
    questions = parsed.map((q,i) => ({
      text: q.text, options: q.options,
      correct_answer_index: q.correct_answer_index ?? 0,
      position: i
    }));
    renderEditor(); closeImport();
    document.getElementById("import-textarea").value = "";
    toast(`${questions.length} question(s) importée(s) ✓`);
  } catch(e) { toast("JSON invalide : " + e.message, true); }
};

// ── Save Supabase ──
window.saveToSupabase = async () => {
  if (!questions.length) { toast("Aucune question à enregistrer", true); return; }
  syncFromDOM();
  for (let i = 0; i < questions.length; i++) {
    if (!questions[i].text.trim())              { toast(`Q${i+1} : texte vide`, true); return; }
    if (questions[i].options.some(o=>!o.trim())) { toast(`Q${i+1} : réponse vide`, true); return; }
  }
  const btn = document.querySelector("button[onclick='saveToSupabase()']");
  btn.disabled = true; btn.textContent = "Enregistrement…";

  await sb.from("quiz_questions").delete().neq("id", 0);
  const rows = questions.map((q,i) => ({
    text: q.text, options: q.options,
    correct_answer_index: q.correct_answer_index,
    position: i
  }));
  const { data, error } = await sb.from("quiz_questions").insert(rows).select();
  btn.disabled = false; btn.innerHTML = "💾 Enregistrer dans Supabase";

  if (error) { toast("Erreur : " + error.message, true); return; }
  questions = (data||[]).sort((a,b) => a.position - b.position);
  renderEditor(); renderNav(); renderResults();
  toast(`${questions.length} question(s) enregistrée(s) ✓`);
};

// ════════ DASHBOARD ════════
async function setQuizState(status, idx) {
  const { error } = await sb.from("quiz_state")
    .update({ status, current_question_index: idx }).eq("id", 1);
  if (error) toast("Erreur Supabase : " + error.message, true);
}

window.startQuiz    = () => { if (!questions.length) { toast("Enregistrez d'abord les questions", true); return; } currentIdx=0; setQuizState("question",0); };
window.nextQuestion = () => { currentIdx++; if (currentIdx>=questions.length) setQuizState("done",currentIdx); else setQuizState("question",currentIdx); };
window.endQuiz      = () => setQuizState("done", currentIdx);
window.showPodium   = () => setQuizState("podium", currentIdx);
window.resetQuiz    = async () => {
  if (!confirm("Réinitialiser TOUS les votes et scores ?")) return;
  await sb.from("quiz_votes").delete().neq("id",0);
  await sb.from("quiz_players").delete().neq("id",0);
  await setQuizState("waiting",-1);
  currentIdx=-1; voteCounts={};
  renderNav(); renderResults(); refreshMiniRanking();
  toast("Quiz réinitialisé");
};

// ── Realtime état ──
sb.channel("admin_state")
  .on("postgres_changes",
    { event:"UPDATE", schema:"public", table:"quiz_state", filter:"id=eq.1" },
    p => applyState(p.new))
  .subscribe();

function applyState(state) {
  currentIdx = state.current_question_index ?? -1;
  const s    = state.status;
  const pill = document.getElementById("status-pill");
  const txt  = document.getElementById("status-text");
  const bs = document.getElementById("btn-start");
  const bn = document.getElementById("btn-next");
  const be = document.getElementById("btn-end");
  const bp = document.getElementById("btn-podium");

  const cfg = {
    waiting: { cls:"pill-waiting", label:"En attente",   blink:false, start:false, next:true, end:true, pod:true },
    question:{ cls:"pill-live",    label:`Q${currentIdx+1} en cours`, blink:true, start:true, next:false, end:false, pod:true },
    done:    { cls:"pill-done",    label:"Terminé",       blink:false, start:true, next:true, end:true, pod:false },
    podium:  { cls:"pill-podium",  label:"Podium 🏆",    blink:true,  start:true, next:true, end:true, pod:true },
  };
  const c = cfg[s] || cfg.waiting;
  pill.className = "status-pill " + c.cls;
  txt.textContent = c.label;
  pill.querySelector(".dot").classList.toggle("blink", c.blink);
  bs.disabled = c.start; bn.disabled = c.next; be.disabled = c.end; bp.disabled = c.pod;

  renderNav(); renderResults();
}

// ── Realtime votes ──
sb.channel("admin_votes")
  .on("postgres_changes",
    { event:"INSERT", schema:"public", table:"quiz_votes" },
    p => {
      const { question_id, answer_index } = p.new;
      if (!voteCounts[question_id]) voteCounts[question_id] = {};
      voteCounts[question_id][answer_index] = (voteCounts[question_id][answer_index]||0)+1;
      refreshCard(question_id);
    })
  .subscribe();

// ── Realtime scores ──
sb.channel("admin_players")
  .on("postgres_changes",
    { event:"*", schema:"public", table:"quiz_players" },
    () => refreshMiniRanking())
  .subscribe();

// ── Classement mini ──
async function refreshMiniRanking() {
  const { data } = await sb.from("quiz_players")
    .select("username,score")
    .order("score",{ascending:false})
    .order("created_at",{ascending:true})
    .limit(10);

  const posClass = ["gold","silver","bronze"];
  const medals   = ["🥇","🥈","🥉"];
  const el = document.getElementById("mini-ranking");
  if (!data || !data.length) {
    el.innerHTML = `<div style="color:var(--faint);font-size:.88rem">Aucun participant pour l'instant…</div>`;
    return;
  }
  el.innerHTML = data.map((p,i) => `
    <div class="mini-rank-row">
      <div class="mini-rank-pos ${posClass[i]||""}">${i<3?medals[i]:i+1}</div>
      <div class="mini-rank-name">${esc(p.username)}</div>
      <div class="mini-rank-score">${p.score} pt${p.score!==1?"s":""}</div>
    </div>`).join("");
}

// ── Résultats ──
function renderNav() {
  document.getElementById("q-nav").innerHTML = questions.map((_,i) =>
    `<button class="q-nav-btn ${i===currentIdx?"active":""}"
      onclick="document.getElementById('rc-${i}')?.scrollIntoView({behavior:'smooth'})">${i+1}</button>`
  ).join("");
}

function renderResults() {
  const c = document.getElementById("results-container");
  if (!questions.length) {
    c.innerHTML = `<div class="dash-empty">Aucune question enregistrée.<br>Allez dans <strong>✏️ Questions</strong>.</div>`;
    return;
  }
  c.innerHTML = questions.map((q,i) => `
    <div class="result-card ${i===currentIdx?"is-live":""}" id="rc-${i}">
      <div class="r-label">
        Question ${i+1}
        ${i===currentIdx?'<span class="live-badge-sm">EN COURS</span>':""}
      </div>
      <div class="r-text">${esc(q.text)||"(sans titre)"}</div>
      <div class="r-rows">
        ${(q.options||[]).map((o,j) => `
          <div class="r-row">
            <div class="r-top">
              <span class="r-opt">
                ${LETTERS[j]}. ${esc(o)}
                ${j===q.correct_answer_index?'<span class="r-correct-tag">✓ bonne réponse</span>':""}
              </span>
              <span>
                <span class="r-pct" id="pct-${q.id}-${j}">0%</span>
                <span class="r-cnt" id="cnt-${q.id}-${j}">(0)</span>
              </span>
            </div>
            <div class="bar-wrap">
              <div class="bar-fill ${j===q.correct_answer_index?"correct-bar":""}"
                id="bar-${q.id}-${j}" style="width:0%"></div>
            </div>
          </div>`).join("")}
      </div>
      <div class="r-footer" id="tot-${q.id}">0 vote(s)</div>
    </div>`).join("");

  questions.forEach(q => refreshCard(q.id));
}

function refreshCard(qId) {
  const q = questions.find(q => q.id===qId);
  if (!q) return;
  const counts = voteCounts[qId] || {};
  const total  = Object.values(counts).reduce((a,b)=>a+b,0);
  q.options.forEach((_,j) => {
    const c   = counts[j]||0;
    const pct = total>0 ? Math.round(c/total*100) : 0;
    const p = document.getElementById(`pct-${qId}-${j}`);
    const n = document.getElementById(`cnt-${qId}-${j}`);
    const b = document.getElementById(`bar-${qId}-${j}`);
    if (p) p.textContent = pct+"%";
    if (n) n.textContent = `(${c})`;
    if (b) b.style.width  = pct+"%";
  });
  const t = document.getElementById(`tot-${qId}`);
  if (t) t.textContent = `${total} vote(s)`;
}

// ════════ INIT ════════
async function init() {
  const { data: qs } = await sb.from("quiz_questions").select("*").order("position");
  questions = qs || [];
  renderEditor();

  const { data: state } = await sb.from("quiz_state").select("*").eq("id",1).single();
  if (state) applyState(state);

  const { data: votes } = await sb.from("quiz_votes").select("question_id,answer_index");
  (votes||[]).forEach(({question_id,answer_index}) => {
    if (!voteCounts[question_id]) voteCounts[question_id]={};
    voteCounts[question_id][answer_index] = (voteCounts[question_id][answer_index]||0)+1;
  });

  renderNav(); renderResults(); refreshMiniRanking();
}

init();
</script>
</body>
</html>
