<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kahoot Elise Et Romain</title>
  <script src="./config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #ffffff;
      --gold:   #c9a227;
      --gold2:  #e8cf6e;
      --ink:    #1d1d1f;
      --muted:  #8a8a86;
      --border: #ece3c8;
      --surface:#fdfaf2;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--ink); overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      height: 100vh; display: flex; flex-direction: row;
      align-items: center; justify-content: center; gap: clamp(32px,4vw,60px);
      padding: 40px 80px; position: relative;
      max-width: 1400px; margin: 0 auto;
    }

    .stage-main {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: clamp(16px,2.4vh,28px);
      z-index: 1;
      flex: 1 1 0;        /* prend l'espace restant sans pousser le QR */
      min-width: 0;       /* évite le débordement du texte */
      max-width: 520px;
    }

    .qr-image {
      z-index: 1;
      width: clamp(260px,28vw,400px);   /* taille garantie, pas compressible */
      height: auto;
      flex-shrink: 0;                    /* ne se rétrécit jamais */
      filter: drop-shadow(0 20px 50px rgba(0,0,0,0.18));
    }

    /* Décor doré discret en arrière-plan */
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid var(--border);
    }
    .ring-1 { width: 60vmin; height: 60vmin; }
    .ring-2 { width: 80vmin; height: 80vmin; }
    .ring-3 { width: 100vmin; height: 100vmin; }

    @media (max-width: 860px) {
      .stage { flex-direction: column; gap: clamp(20px,3vh,32px); height: auto; min-height: 100vh; overflow-y: auto; }
      .qr-image { width: clamp(180px,48vw,280px); }
      .participants-panel { width: 100%; max-width: 480px; max-height: 220px; }
    }

    /* ── Panneau participants ── */
    .participants-panel {
      z-index: 1; flex-shrink: 0;
      width: clamp(260px,24vw,360px);
      max-height: min(560px, 78vh);
      display: flex; flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: clamp(16px,2vw,24px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }
    .participants-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px; flex-shrink: 0;
    }
    .participants-title {
      font-size: clamp(.78rem,1.1vw,.92rem); font-weight: 700;
      color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .participants-count {
      font-size: clamp(1.6rem,2.6vw,2.2rem); font-weight: 800;
      color: var(--ink); line-height: 1; font-variant-numeric: tabular-nums;
    }
    .participants-count span {
      font-size: clamp(.75rem,1.1vw,.9rem); font-weight: 500;
      color: var(--muted); margin-left: 4px;
    }
    .participants-list {
      flex: 1; overflow-y: auto;
      display: flex; flex-wrap: wrap; gap: 8px;
      align-content: flex-start;
      padding-right: 2px;
    }
    .participants-list::-webkit-scrollbar { width: 5px; }
    .participants-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .participant-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px 6px 6px;
      background: #fff; border: 1px solid var(--border);
      border-radius: 999px;
      font-size: clamp(.8rem,1.1vw,.92rem); font-weight: 600; color: var(--ink);
      opacity: 0; transform: translateY(6px) scale(0.96);
      animation: badgeIn 0.35s ease forwards;
    }
    @keyframes badgeIn { to { opacity: 1; transform: translateY(0) scale(1); } }
    .participant-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      color: #fff; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .participants-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      text-align: center; color: var(--muted); font-size: .9rem;
      padding: 20px 10px;
    }

    .eyebrow {
      font-size: clamp(.9rem,1.6vw,1.2rem); font-weight: 600;
      color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase;
      z-index: 1;
    }

    .title {
      font-size: clamp(2.4rem,6vw,5rem); font-weight: 800;
      letter-spacing: -0.02em; line-height: 1.05; color: var(--ink);
      z-index: 1; max-width: 100%;
    }
    .title .accent {
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(1rem,2vw,1.4rem); color: var(--muted);
      z-index: 1; max-width: 560px;
    }

    .btn-launch {
      display: flex; align-items: center; gap: 12px;
      padding: clamp(16px,2.5vh,22px) clamp(36px,5vw,56px);
      border-radius: 999px; border: none;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      color: #fff; cursor: pointer; font-family: inherit;
      font-size: clamp(1.1rem,2.2vw,1.6rem); font-weight: 700;
      box-shadow: 0 10px 30px rgba(201,162,39,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 1; margin-top: 8px;
    }
    .btn-launch:hover { transform: translateY(-3px); box-shadow: 0 14px 38px rgba(201,162,39,0.4); }
    .btn-launch:active { transform: translateY(0); }
    .btn-launch svg { width: clamp(20px,3vw,28px); height: clamp(20px,3vw,28px); }

    .error-msg {
      font-size: 14px; color: #c0392b; z-index: 1; min-height: 18px;
      max-width: 480px;
    }

    .footer-hint {
      position: absolute; bottom: 28px; font-size: 13px; color: var(--muted);
      z-index: 1;
    }

    @keyframes floatRing { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.03); } }
    .ring { top: 50%; left: 50%; transform: translate(-50%,-50%); animation: floatRing 8s ease-in-out infinite; }
    .ring-2 { animation-delay: -2s; }
    .ring-3 { animation-delay: -4s; }
  </style>
</head>
<body>

<div class="stage">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="stage-main">
    <div class="eyebrow">Bienvenue au</div>
    <div class="title">Kahoot<br><span class="accent">Elise Et Romain</span></div>
    <div class="subtitle">Préparez vos téléphones, le quiz commence dans un instant.</div>

    <button class="btn-launch" id="btn-launch" onclick="launchQuiz()">
      Lancer
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>
    </button>

    <div class="error-msg" id="launch-error"></div>
  </div>

  <div style="z-index:1; display:flex; flex-direction:column; align-items:center; gap:8px;">
    <img src="./qr-scan-me.png?v=2" alt="Scannez pour rejoindre le quiz" class="qr-image"/>
    <div style="font-size:clamp(.7rem,1.1vw,.9rem); color:var(--muted); text-align:center; line-height:1.4;">
      Ou accédez à l'adresse :<br>
      <span style="font-weight:700; color:var(--gold); font-size:clamp(.75rem,1.2vw,.95rem);">https://z9qc7knffr-alt.github.io/mariage-quiz/</span>
    </div>
  </div>

  <div class="participants-panel">
    <div class="participants-head">
      <div class="participants-title">Participants</div>
      <div class="participants-count" id="participants-count">0<span>inscrit(s)</span></div>
    </div>
    <div class="participants-list" id="participants-list">
      <div class="participants-empty" id="participants-empty">En attente des premiers participants…</div>
    </div>
  </div>

  <div class="footer-hint">Affichage destiné au rétroprojecteur</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON;

if (!SUPABASE_URL || SUPABASE_URL.includes("XXXXXXXX")) {
  document.body.innerHTML = `<div style="font-family:system-ui;padding:3rem;max-width:520px;margin:0 auto"><h2 style="margin-bottom:1rem">Configuration manquante</h2><p style="color:#8a8a86">Copiez config.example.js en config.js et renseignez vos clés Supabase.</p></div>`;
  throw new Error("config.js non configuré");
}

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Liste des participants en temps réel ────────────────────────
const participants = new Map(); // device_id -> username

function initials(name) {
  return name.trim().slice(0, 2).toUpperCase();
}

function renderParticipants() {
  const listEl  = document.getElementById("participants-list");
  const countEl = document.getElementById("participants-count");
  const names   = Array.from(participants.values());

  countEl.innerHTML = `${names.length}<span>inscrit${names.length !== 1 ? "s" : ""}</span>`;

  if (names.length === 0) {
    listEl.innerHTML = `<div class="participants-empty" id="participants-empty">En attente des premiers participants…</div>`;
    return;
  }

  listEl.innerHTML = names.map(name => `
    <div class="participant-badge">
      <span class="participant-avatar">${initials(name)}</span>
      ${name}
    </div>`).join("");
}

async function loadParticipants() {
  const { data, error } = await sb.from("quiz_players")
    .select("device_id, username")
    .order("created_at", { ascending: true });
  if (error) { console.error("[participants] erreur chargement:", error); return; }
  participants.clear();
  (data || []).forEach(p => participants.set(p.device_id, p.username));
  renderParticipants();
}

function subscribeParticipants() {
  sb.channel("welcome_players")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "quiz_players" }, payload => {
      participants.set(payload.new.device_id, payload.new.username);
      renderParticipants();
    })
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "quiz_players" }, payload => {
      participants.set(payload.new.device_id, payload.new.username);
      renderParticipants();
    })
    .on("postgres_changes", { event: "DELETE", schema: "public", table: "quiz_players" }, payload => {
      // Sur DELETE, Supabase ne fournit que les colonnes de la clé primaire par défaut (id)
      // On gère ce cas en rechargeant la liste complète plutôt qu'en devinant le device_id
      loadParticipants();
    })
    .subscribe();
}

loadParticipants();
subscribeParticipants();

window.launchQuiz = async () => {
  const btn = document.getElementById("btn-launch");
  const errEl = document.getElementById("launch-error");
  errEl.textContent = "";
  btn.disabled = true;
  btn.querySelector("svg")?.remove();
  const originalText = btn.textContent;
  btn.textContent = "Lancement…";

  // Vérifier qu'il y a bien des questions enregistrées (comme dans admin.html)
  const { data: questions, error: qErr } = await sb.from("quiz_questions").select("id").order("position");
  if (qErr || !questions || questions.length === 0) {
    errEl.textContent = "Aucune question enregistrée — utilisez d'abord l'éditeur admin.";
    btn.disabled = false;
    btn.textContent = originalText;
    return;
  }

  // Même logique que startQuiz() dans admin.html :
  // status "question", index 0, horodatage de départ pour le minuteur synchronisé
  const { error } = await sb.from("quiz_state").update({
    status: "question",
    current_question_index: 0,
    question_started_at: new Date().toISOString()
  }).eq("id", 1);

  if (error) {
    errEl.textContent = "Erreur Supabase : " + error.message;
    btn.disabled = false;
    btn.textContent = originalText;
    return;
  }

  location.href = "./display.html";
};
</script>
</body>
</html>
