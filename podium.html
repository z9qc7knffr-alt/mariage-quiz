<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Podium — Quiz Mariage 💍</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
      --purple: #7c3aed;
      --bg1:    #0f0520;
      --bg2:    #1e0d3e;
    }

    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Stars background ── */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 10%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 68% 35%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 18%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,.3) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    /* ── Écran attente ── */
    #screen-wait {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1;
    }
    #screen-wait .rings {
      width: 120px; height: 120px;
      border: 3px solid rgba(192,132,252,.3);
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #screen-wait p { font-size: 1.2rem; color: #c084fc; font-weight: 500; }

    /* ── Podium principal ── */
    #screen-podium {
      position: relative; z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2.5rem 1.5rem 3rem;
    }
    #screen-podium.visible { display: flex; }

    /* En-tête */
    .pod-header { text-align: center; margin-bottom: 2.5rem; }
    .pod-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      background: linear-gradient(90deg, #f59e0b, #c084fc, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pod-subtitle { font-size: 1.1rem; color: #b08abb; margin-top: .35rem; }
    .confetti-row { font-size: 1.8rem; letter-spacing: .3rem; margin-top: .5rem; }

    /* Podium visuel top 3 */
    .podium-stage {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 3rem;
      width: 100%;
      max-width: 600px;
    }
    .stage-col {
      display: flex; flex-direction: column; align-items: center;
      flex: 1;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .stage-col.show { opacity: 1; transform: translateY(0); }

    .stage-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800;
      margin-bottom: .5rem; flex-shrink: 0;
    }
    .stage-name {
      font-size: .9rem; font-weight: 700; text-align: center;
      max-width: 90px; word-break: break-word; margin-bottom: .3rem;
    }
    .stage-score {
      font-size: .78rem; color: rgba(255,255,255,.65);
      margin-bottom: .5rem;
    }
    .stage-block {
      width: 100%; border-radius: 10px 10px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800;
    }

    /* Positions */
    .pos-1 .stage-avatar { background: linear-gradient(135deg,#fde68a,#f59e0b); color: #78350f; box-shadow: 0 0 24px rgba(245,158,11,.5); }
    .pos-1 .stage-block  { height: 130px; background: linear-gradient(180deg,#f59e0b,#92400e); }
    .pos-1 .stage-name   { font-size: 1rem; color: #fde68a; }
    .pos-2 .stage-avatar { background: linear-gradient(135deg,#e2e8f0,#94a3b8); color: #1e293b; box-shadow: 0 0 16px rgba(148,163,184,.4); }
    .pos-2 .stage-block  { height: 100px; background: linear-gradient(180deg,#94a3b8,#334155); }
    .pos-3 .stage-avatar { background: linear-gradient(135deg,#fed7aa,#b45309); color: #431407; box-shadow: 0 0 12px rgba(180,83,9,.4); }
    .pos-3 .stage-block  { height: 70px;  background: linear-gradient(180deg,#b45309,#431407); }

    /* Médaille */
    .medal { font-size: 1.8rem; margin-bottom: .25rem; }

    /* Tableau classement complet */
    .ranking-wrap {
      width: 100%; max-width: 520px;
    }
    .ranking-title {
      text-align: center; font-size: 1rem; font-weight: 700;
      color: #c084fc; letter-spacing: .05em; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .ranking-list { display: flex; flex-direction: column; gap: .5rem; }

    .rank-row {
      display: flex; align-items: center; gap: .75rem;
      background: rgba(255,255,255,.06);
      border-radius: 10px; padding: .65rem 1rem;
      border: 1px solid rgba(255,255,255,.08);
      opacity: 0; transform: translateX(-20px);
      transition: opacity .4s ease, transform .4s ease;
    }
    .rank-row.show { opacity: 1; transform: translateX(0); }

    .rank-pos {
      width: 28px; text-align: center;
      font-size: .85rem; font-weight: 700; color: #b08abb;
      flex-shrink: 0;
    }
    .rank-pos.gold   { color: var(--gold); }
    .rank-pos.silver { color: var(--silver); }
    .rank-pos.bronze { color: var(--bronze); }

    .rank-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(124,58,237,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; font-weight: 700; color: #e9d5ff;
      flex-shrink: 0;
    }
    .rank-name  { flex: 1; font-size: .97rem; font-weight: 600; }
    .rank-score {
      font-size: .9rem; font-weight: 700; color: #c084fc;
    }
    .rank-bar-wrap {
      position: absolute; left: 0; bottom: 0; right: 0; height: 3px;
      background: rgba(255,255,255,.06); border-radius: 0 0 10px 10px; overflow: hidden;
    }
    .rank-row { position: relative; }
    .rank-bar { height: 100%; background: linear-gradient(90deg,#7c3aed,#c084fc); transition: width .8s ease; }

    .live-badge {
      position: fixed; top: 1rem; right: 1rem;
      background: rgba(22,163,74,.9); color: #fff;
      font-size: .75rem; font-weight: 700;
      padding: .3rem .7rem; border-radius: 999px;
      display: flex; align-items: center; gap: .35rem;
      z-index: 10;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #fff; animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .empty-podium {
      text-align: center; padding: 3rem 1rem; color: #b08abb; font-size: 1.1rem;
    }
  </style>
</head>
<body>

<div class="live-badge">
  <div class="live-dot"></div> LIVE
</div>

<!-- Attente -->
<div id="screen-wait">
  <div class="rings"></div>
  <p>En attente du classement…</p>
</div>

<!-- Podium -->
<div id="screen-podium">
  <div class="pod-header">
    <div class="pod-title">🏆 Classement Final</div>
    <div class="pod-subtitle">Quiz du Mariage 💍</div>
    <div class="confetti-row">🎉 🥂 💕 🎊 💍</div>
  </div>

  <!-- Top 3 visuel -->
  <div class="podium-stage" id="podium-stage"></div>

  <!-- Liste complète -->
  <div class="ranking-wrap">
    <div class="ranking-title">Classement complet</div>
    <div class="ranking-list" id="ranking-list"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
import { SUPABASE_URL, SUPABASE_ANON } from "./config.js";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let podiumShown = false;

async function init() {
  const { data: state } = await sb.from("quiz_state").select("status").eq("id", 1).single();
  if (state?.status === "podium" || state?.status === "done") {
    await showPodium();
  }

  sb.channel("podium_state")
    .on("postgres_changes",
      { event: "UPDATE", schema: "public", table: "quiz_state", filter: "id=eq.1" },
      async p => {
        if (p.new.status === "podium" || p.new.status === "done") {
          await showPodium();
        }
      })
    .subscribe();

  // Rafraîchissement live des scores
  sb.channel("podium_votes")
    .on("postgres_changes",
      { event: "*", schema: "public", table: "quiz_players" },
      async () => { if (podiumShown) await refreshRanking(); })
    .subscribe();
}

async function showPodium() {
  podiumShown = true;
  document.getElementById("screen-wait").style.display = "none";
  document.getElementById("screen-podium").classList.add("visible");
  await refreshRanking();
}

async function refreshRanking() {
  const { data: players } = await sb
    .from("quiz_players")
    .select("username, score")
    .order("score", { ascending: false })
    .order("created_at", { ascending: true }); // ex-æquo : premier connecté gagne

  if (!players || players.length === 0) {
    document.getElementById("podium-stage").innerHTML =
      `<div class="empty-podium">Aucun participant pour l'instant…</div>`;
    document.getElementById("ranking-list").innerHTML = "";
    return;
  }

  const maxScore = players[0]?.score || 1;
  renderStage(players.slice(0, 3));
  renderList(players, maxScore);
}

function initials(name) {
  return name.slice(0, 2).toUpperCase();
}

function renderStage(top) {
  // Ordre visuel podium : 2e - 1er - 3e
  const order = [top[1], top[0], top[2]].filter(Boolean);
  const posClass = top[1] ? ["pos-2","pos-1","pos-3"] : ["pos-1"];
  const medals   = ["🥈","🥇","🥉"];

  const stage = document.getElementById("podium-stage");
  stage.innerHTML = order.map((p, vi) => {
    const realPos = order.indexOf(p) === 1 ? 0 : (order.indexOf(p) === 0 ? 1 : 2);
    const pos = posClass[vi];
    const medal = medals[vi];
    return `
    <div class="stage-col ${pos}" id="stage-col-${vi}">
      <div class="medal">${medal}</div>
      <div class="stage-avatar">${initials(p.username)}</div>
      <div class="stage-name">${p.username}</div>
      <div class="stage-score">${p.score} pt${p.score > 1 ? "s" : ""}</div>
      <div class="stage-block">${[2,1,3][vi]}</div>
    </div>`;
  }).join("");

  // Animation en cascade
  order.forEach((_, i) => {
    setTimeout(() => {
      document.getElementById(`stage-col-${i}`)?.classList.add("show");
    }, 200 + i * 250);
  });
}

function renderList(players, maxScore) {
  const medals = ["🥇","🥈","🥉"];
  const posClass = ["gold","silver","bronze"];

  const list = document.getElementById("ranking-list");
  list.innerHTML = players.map((p, i) => `
    <div class="rank-row" id="rr-${i}">
      <div class="rank-pos ${posClass[i] || ""}">
        ${i < 3 ? medals[i] : i + 1}
      </div>
      <div class="rank-avatar">${initials(p.username)}</div>
      <div class="rank-name">${p.username}</div>
      <div class="rank-score">${p.score} pt${p.score > 1 ? "s" : ""}</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar" id="bar-${i}" style="width:0%"></div>
      </div>
    </div>`).join("");

  // Animation en cascade + barres
  players.forEach((p, i) => {
    setTimeout(() => {
      document.getElementById(`rr-${i}`)?.classList.add("show");
      const pct = maxScore > 0 ? Math.round(p.score / maxScore * 100) : 0;
      setTimeout(() => {
        const bar = document.getElementById(`bar-${i}`);
        if (bar) bar.style.width = pct + "%";
      }, 100);
    }, 100 + i * 120);
  });
}

init();
</script>
</body>
</html>
