<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Podium — Quiz Mariage</title>
  <script src="./config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --border: #ece3c8; --muted: #8a8a86; --faint: #c9c4b4;
      --text: #1d1d1f; --gold:#c9a227; --gold2:#e8cf6e;
      --silver:#8a8a86; --bronze:#a9763e; --surface:#fdfaf2;
    }
    html, body {
      min-height:100%; background:var(--bg); color:var(--text); overflow-x:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .page { max-width:720px; margin:0 auto; padding:clamp(32px,5vw,64px) clamp(24px,4vw,48px) 80px; }

    /* ── Attente ── */
    #s-wait { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
    .spin { width:48px; height:48px; border-radius:50%; border:1.5px solid var(--border); border-top-color:var(--gold); animation:spin 1.2s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .wait-lbl { font-size:1rem; color:var(--muted); }

    /* ── Podium ── */
    #s-podium { display:none; }
    #s-podium.visible { display:block; }

    .pod-header { text-align:center; margin-bottom:clamp(32px,5vh,56px); }
    .pod-eyebrow { font-size:13px; font-weight:600; color:var(--gold); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:10px; }
    .pod-title { font-size:clamp(2.5rem,6vw,4rem); font-weight:700; letter-spacing:-2px; line-height:1; color:var(--text); }
    .pod-subtitle { font-size:clamp(.95rem,1.8vw,1.2rem); color:var(--muted); margin-top:8px; }

    /* Podium top 3 visuel */
    .stage {
      display:flex; align-items:flex-end; justify-content:center;
      gap:clamp(8px,2vw,20px); margin-bottom:clamp(32px,5vh,56px);
    }
    .stage-col {
      display:flex; flex-direction:column; align-items:center;
      flex:1; max-width:200px;
      opacity:0; transform:translateY(24px);
      transition:opacity .5s ease, transform .5s ease;
    }
    .stage-col.show { opacity:1; transform:translateY(0); }

    .s-medal { font-size:clamp(1.5rem,3vw,2rem); margin-bottom:6px; }
    .s-avatar {
      width:clamp(44px,7vw,64px); height:clamp(44px,7vw,64px); border-radius:50%;
      border:1.5px solid var(--gold2); background:var(--surface);
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(14px,2.5vw,20px); font-weight:700; color:var(--gold);
      margin-bottom:8px;
    }
    .s-name  { font-size:clamp(.85rem,1.8vw,1.1rem); font-weight:600; text-align:center; margin-bottom:3px; max-width:120px; word-break:break-word; color:var(--text); }
    .s-score { font-size:clamp(.75rem,1.4vw,.9rem); color:var(--muted); margin-bottom:4px; }
    .s-time  { font-size:clamp(.65rem,1.2vw,.8rem); color:var(--faint); margin-bottom:8px; }
    .r-time  { font-size:12px; color:var(--muted); margin-left:6px; }
    .s-block {
      width:100%; border-radius:8px 8px 0 0;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(1.2rem,2.5vw,1.8rem); font-weight:700;
    }
    .s-block.gold   { height:clamp(80px,14vh,130px); background:linear-gradient(180deg,var(--gold2),var(--gold)); color:#fff; }
    .s-block.silver { height:clamp(60px,10vh,100px); background:#f3f1ea; border:1px solid var(--border); color:var(--silver); }
    .s-block.bronze { height:clamp(44px,7vh,72px);   background:#f6ebdb; border:1px solid #e3cba3; color:var(--bronze); }

    /* Classement complet */
    .list-title { font-size:12px; font-weight:600; color:var(--gold); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:12px; }
    .rank-list  { display:flex; flex-direction:column; gap:2px; }
    .rank-row {
      display:flex; align-items:center; gap:14px;
      padding:12px 16px; border-radius:10px;
      opacity:0; transform:translateX(-12px);
      transition:opacity .4s ease, transform .4s ease;
      border:1px solid transparent;
    }
    .rank-row.show { opacity:1; transform:translateX(0); }
    .rank-row:hover { background:var(--surface); border-color:var(--border); }

    .r-pos  { width:28px; font-size:14px; font-weight:600; color:var(--muted); text-align:center; flex-shrink:0; }
    .r-pos.gold   { color:var(--gold); }
    .r-pos.silver { color:var(--silver); }
    .r-pos.bronze { color:var(--bronze); }

    .r-avatar {
      width:36px; height:36px; border-radius:50%;
      border:1px solid var(--border); background:var(--surface);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; color:var(--gold); flex-shrink:0;
    }
    .r-name  { flex:1; font-size:15px; font-weight:500; color:var(--text); }
    .r-score { font-size:15px; color:var(--muted); }

    .r-bar-wrap { width:80px; flex-shrink:0; }
    .r-bar-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .r-bar-fill  { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width .7s ease; }

    .empty { text-align:center; padding:40px; color:var(--muted); font-size:15px; }
    .live-tag {
      position:fixed; top:20px; right:20px; z-index:10;
      display:flex; align-items:center; gap:6px;
      font-size:12px; font-weight:500; color:var(--muted);
      background:var(--surface); border:1px solid var(--border);
      padding:5px 12px; border-radius:999px;
    }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  </style>
</head>
<body>

<div class="live-tag"><div class="live-dot"></div> Live</div>

<!-- Attente -->
<div id="s-wait">
  <div class="spin"></div>
  <div class="wait-lbl">En attente du podium…</div>
</div>

<!-- Podium -->
<div id="s-podium">
  <div class="page">
    <div class="pod-header">
      <div class="pod-eyebrow">Quiz du mariage</div>
      <div class="pod-title">Classement final</div>
      <div class="pod-subtitle">Félicitations à tous les participants</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="list-title">Classement complet</div>
    <div class="rank-list" id="rank-list"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let shown = false;

async function init() {
  const {data:state} = await sb.from("quiz_state").select("status").eq("id",1).single();
  if (state?.status==="podium"||state?.status==="done") await showPodium();

  sb.channel("p_state")
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"quiz_state",filter:"id=eq.1"},
      async p => { if (p.new.status==="podium"||p.new.status==="done") await showPodium(); })
    .subscribe();

  sb.channel("p_players")
    .on("postgres_changes",{event:"*",schema:"public",table:"quiz_players"},
      async () => { if (shown) await refresh(); })
    .subscribe();
}

async function showPodium() {
  shown=true;
  document.getElementById("s-wait").style.display="none";
  document.getElementById("s-podium").classList.add("visible");
  await refresh();
}

function fmtTime(ms) {
  if (!ms) return "";
  const s = Math.round(ms / 1000);
  return s < 60 ? `${s}s` : `${Math.floor(s/60)}m${String(s%60).padStart(2,"0")}s`;
}

async function refresh() {
  const {data:players} = await sb.from("quiz_players")
    .select("username,score,total_time_ms")
    .order("score",         { ascending: false })
    .order("total_time_ms", { ascending: true  });  // départage : plus rapide gagne
  if (!players||!players.length) {
    document.getElementById("stage").innerHTML=`<div class="empty">Aucun participant.</div>`;
    document.getElementById("rank-list").innerHTML="";
    return;
  }
  const max=players[0]?.score||1;
  renderStage(players.slice(0,3));
  renderList(players,max);
}

const initials = n => n.slice(0,2).toUpperCase();

function renderStage(top) {
  // Ordre visuel sur le podium : 2e à gauche / 1er au centre / 3e à droite.
  // On garde la médaille/bloc associés à la VRAIE position (top[0]=or, top[1]=argent, top[2]=bronze)
  // même quand il y a moins de 3 joueurs, pour ne pas décaler les emplacements.
  const slots = [
    { player: top[1], medal: "🥈", block: "silver", label: 2 }, // gauche
    { player: top[0], medal: "🥇", block: "gold",   label: 1 }, // centre
    { player: top[2], medal: "🥉", block: "bronze", label: 3 }, // droite
  ].filter(s => s.player);

  document.getElementById("stage").innerHTML = slots.map((s, vi) => `
    <div class="stage-col" id="sc-${vi}">
      <div class="s-medal">${s.medal}</div>
      <div class="s-avatar">${initials(s.player.username)}</div>
      <div class="s-name">${s.player.username}</div>
      <div class="s-score">${s.player.score} pt${s.player.score!==1?"s":""}</div>
      ${s.player.total_time_ms ? `<div class="s-time">⏱ ${fmtTime(s.player.total_time_ms)} cumulé</div>` : ""}
      <div class="s-block ${s.block}">${s.label}</div>
    </div>`).join("");

  slots.forEach((_, i) => {
    setTimeout(() => document.getElementById(`sc-${i}`)?.classList.add("show"), 150 + i * 200);
  });
}

function renderList(players, max) {
  const medals=["🥇","🥈","🥉"];
  const posClass=["gold","silver","bronze"];
  const list=document.getElementById("rank-list");
  list.innerHTML=players.map((p,i)=>`
    <div class="rank-row" id="rr-${i}">
      <div class="r-pos ${posClass[i]||""}">${i<3?medals[i]:i+1}</div>
      <div class="r-avatar">${initials(p.username)}</div>
      <div class="r-name">${p.username}</div>
      <div class="r-bar-wrap">
        <div class="r-bar-track"><div class="r-bar-fill" id="rb-${i}" style="width:0%"></div></div>
      </div>
      <div class="r-score">
        ${p.score} pt${p.score!==1?"s":""}
        ${p.total_time_ms ? `<span class="r-time">⏱ ${fmtTime(p.total_time_ms)} cumulé</span>` : ""}
      </div>
    </div>`).join("");

  players.forEach((p,i)=>{
    setTimeout(()=>{
      document.getElementById(`rr-${i}`)?.classList.add("show");
      const pct=max>0?Math.round(p.score/max*100):0;
      setTimeout(()=>{ const b=document.getElementById(`rb-${i}`); if(b) b.style.width=pct+"%"; },80);
    },80+i*80);
  });
}

init();
</script>
</body>
</html>
