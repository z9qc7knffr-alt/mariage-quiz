<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Affichage — Quiz Mariage 💍</title>
  <script src="./config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:   #7c3aed;
      --purple-lt:#c084fc;
      --gold:     #f59e0b;
      --bg1:      #0f0520;
      --bg2:      #1e0d3e;
      --surface:  rgba(255,255,255,.07);
      --border:   rgba(255,255,255,.12);
    }

    html, body {
      height: 100%; font-family: system-ui, sans-serif;
      background: linear-gradient(150deg, var(--bg1) 0%, var(--bg2) 100%);
      color: #fff; overflow: hidden;
    }

    /* ── Écran attente ── */
    #screen-wait {
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
    }
    .wait-logo  { font-size: 5rem; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .wait-title { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; color: var(--purple-lt); }
    .wait-sub   { font-size: 1.1rem; color: rgba(255,255,255,.5); }
    .wait-qr    {
      margin-top: 1rem; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem 2rem;
    }
    .wait-qr p  { font-size: .95rem; color: rgba(255,255,255,.6); margin-bottom: .5rem; }
    .wait-qr .url { font-size: 1.1rem; font-weight: 700; color: var(--purple-lt); }

    /* ── Écran question ── */
    #screen-question {
      display: none; height: 100vh;
      flex-direction: column; padding: 3vw 4vw;
    }
    #screen-question.visible { display: flex; }

    .q-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2.5vh; flex-shrink: 0;
    }
    .q-counter {
      font-size: clamp(.9rem, 1.8vw, 1.2rem); font-weight: 700;
      color: var(--purple-lt); letter-spacing: .06em; text-transform: uppercase;
    }
    .vote-counter {
      font-size: clamp(.85rem, 1.6vw, 1.1rem);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: .3rem 1rem;
      color: rgba(255,255,255,.7);
    }
    .vote-counter span { font-weight: 700; color: #fff; }

    .q-text {
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 800; line-height: 1.25;
      margin-bottom: 4vh; flex-shrink: 0;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5vh 2vw; flex: 1; align-content: start;
    }
    .opt-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.2vh 1.5vw;
      display: flex; flex-direction: column; gap: .6vh;
      transition: border-color .3s;
    }
    .opt-top { display: flex; align-items: center; gap: 1vw; }
    .opt-badge {
      width: clamp(32px,3.5vw,48px); height: clamp(32px,3.5vw,48px);
      border-radius: 50%; background: rgba(124,58,237,.4);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: clamp(.85rem,1.6vw,1.2rem);
      color: var(--purple-lt); flex-shrink: 0;
    }
    .opt-text {
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      font-weight: 600; line-height: 1.3;
    }
    .opt-bar-wrap { height: clamp(6px,1vh,10px); background: rgba(255,255,255,.1); border-radius: 5px; }
    .opt-bar-fill {
      height: 100%; border-radius: 5px;
      background: linear-gradient(90deg, var(--purple), var(--purple-lt));
      transition: width .5s ease; width: 0%;
    }
    .opt-pct {
      font-size: clamp(.8rem,1.5vw,1rem); font-weight: 700;
      color: var(--purple-lt); text-align: right;
    }

    /* ── Transition entre questions ── */
    .fade-out { animation: fadeOut .4s forwards; }
    .fade-in  { animation: fadeIn  .4s forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(.97); } }
    @keyframes fadeIn  { from { opacity: 0; transform: scale(.97); } to { opacity:1; transform:scale(1); } }

    /* ── Écran podium redirect ── */
    #screen-podium {
      display: none; height: 100vh;
      flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
    }
    #screen-podium.visible { display: flex; }
    .pod-redirect-title {
      font-size: clamp(2rem,5vw,3.5rem); font-weight: 800;
      background: linear-gradient(90deg,#f59e0b,#c084fc,#60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .pod-redirect-sub { font-size: 1.1rem; color: rgba(255,255,255,.5); }
    .countdown-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--surface); border: 3px solid var(--purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: var(--purple-lt);
    }

    /* ── Barre de progression en bas ── */
    .progress-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 4px;
      background: rgba(255,255,255,.08);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--purple-lt));
      transition: width .4s ease;
    }

    /* ── Badge LIVE ── */
    .live-badge {
      position: fixed; top: 1rem; right: 1rem;
      background: rgba(22,163,74,.85); color: #fff;
      font-size: .75rem; font-weight: 700;
      padding: .3rem .7rem; border-radius: 999px;
      display: flex; align-items: center; gap: .35rem; z-index: 10;
    }
    .live-dot { width:7px; height:7px; border-radius:50%; background:#fff; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  </style>
</head>
<body>

<div class="live-badge"><div class="live-dot"></div> LIVE</div>

<!-- Attente -->
<div id="screen-wait">
  <div class="wait-logo">💍</div>
  <div class="wait-title">Quiz du Mariage</div>
  <div class="wait-sub">Le quiz va commencer…</div>
  <div class="wait-qr">
    <p>Participez depuis votre téléphone :</p>
    <div class="url" id="game-url">—</div>
  </div>
</div>

<!-- Question en cours -->
<div id="screen-question">
  <div class="q-header">
    <div class="q-counter" id="q-counter">Question 1</div>
    <div class="vote-counter">Votes : <span id="vote-count">0</span></div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="options-grid" id="options-grid"></div>
</div>

<!-- Transition vers podium -->
<div id="screen-podium">
  <div class="pod-redirect-title">🏆 Classement Final !</div>
  <div class="pod-redirect-sub">Redirection en cours…</div>
  <div class="countdown-ring" id="countdown">3</div>
</div>

<!-- Barre de progression -->
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON;

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const LETTERS = ["A","B","C","D","E","F"];

// Afficher l'URL de la page invité dans l'écran d'attente
const base = location.href.replace("display.html","");
document.getElementById("game-url").textContent = base + "index.html";

let questions   = [];
let currentQ    = null;
let voteCounts  = {};
let totalQ      = 0;

// ── Écrans ──────────────────────────────────────────────────────
function showScreen(name) {
  document.getElementById("screen-wait").style.display     = name==="wait"    ? "flex" : "none";
  document.getElementById("screen-question").classList.toggle("visible", name==="question");
  document.getElementById("screen-podium").style.display   = name==="podium"  ? "flex" : "none";
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  const { data: qs } = await sb.from("quiz_questions").select("*").order("position");
  questions = qs || [];
  totalQ    = questions.length;

  const { data: state } = await sb.from("quiz_state").select("*").eq("id",1).single();
  if (state) await handleState(state, false);

  // Écoute temps réel de l'état
  sb.channel("display_state")
    .on("postgres_changes",
      { event:"UPDATE", schema:"public", table:"quiz_state", filter:"id=eq.1" },
      p => handleState(p.new, true))
    .subscribe();

  // Écoute temps réel des votes
  sb.channel("display_votes")
    .on("postgres_changes",
      { event:"INSERT", schema:"public", table:"quiz_votes" },
      p => {
        const { question_id, answer_index } = p.new;
        if (!voteCounts[question_id]) voteCounts[question_id] = {};
        voteCounts[question_id][answer_index] = (voteCounts[question_id][answer_index]||0)+1;
        if (currentQ?.id === question_id) updateBars();
      })
    .subscribe();
}

// ── Gestion de l'état ────────────────────────────────────────────
async function handleState(state, animate) {
  if (state.status === "waiting") {
    showScreen("wait");
    return;
  }
  if (state.status === "podium" || state.status === "done") {
    showPodiumRedirect();
    return;
  }
  if (state.status === "question") {
    const idx = state.current_question_index;
    const q   = questions[idx];
    if (!q) return;

    // Charger les votes déjà existants pour cette question
    if (!voteCounts[q.id]) {
      const { data: existing } = await sb.from("quiz_votes")
        .select("answer_index").eq("question_id", q.id);
      voteCounts[q.id] = {};
      (existing||[]).forEach(v => {
        voteCounts[q.id][v.answer_index] = (voteCounts[q.id][v.answer_index]||0)+1;
      });
    }

    if (animate && currentQ && currentQ.id !== q.id) {
      // Transition animée
      const el = document.getElementById("screen-question");
      el.classList.add("fade-out");
      await sleep(380);
      el.classList.remove("fade-out");
      renderQuestion(q, idx);
      el.classList.add("fade-in");
      await sleep(380);
      el.classList.remove("fade-in");
    } else {
      renderQuestion(q, idx);
    }
    showScreen("question");
  }
}

// ── Rendu d'une question ─────────────────────────────────────────
function renderQuestion(q, idx) {
  currentQ = q;

  document.getElementById("q-counter").textContent =
    `Question ${idx+1} / ${totalQ}`;
  document.getElementById("q-text").textContent = q.text;

  // Barre de progression
  document.getElementById("progress-fill").style.width =
    totalQ > 0 ? `${Math.round((idx+1)/totalQ*100)}%` : "0%";

  // Options — SANS indiquer la bonne réponse
  const grid = document.getElementById("options-grid");
  grid.innerHTML = q.options.map((o, j) => `
    <div class="opt-card" id="opt-${j}">
      <div class="opt-top">
        <div class="opt-badge">${LETTERS[j]}</div>
        <div class="opt-text">${o}</div>
      </div>
      <div class="opt-bar-wrap">
        <div class="opt-bar-fill" id="bar-${j}"></div>
      </div>
      <div class="opt-pct" id="pct-${j}">—</div>
    </div>`).join("");

  updateBars();
}

// ── Mise à jour des barres de % ──────────────────────────────────
function updateBars() {
  if (!currentQ) return;
  const counts = voteCounts[currentQ.id] || {};
  const total  = Object.values(counts).reduce((a,b)=>a+b,0);

  document.getElementById("vote-count").textContent = total;

  currentQ.options.forEach((_, j) => {
    const c   = counts[j] || 0;
    const pct = total > 0 ? Math.round(c/total*100) : 0;
    const bar = document.getElementById(`bar-${j}`);
    const lbl = document.getElementById(`pct-${j}`);
    if (bar) bar.style.width = pct+"%";
    if (lbl) lbl.textContent = total > 0 ? pct+"%" : "—";
  });
}

// ── Podium : compte à rebours + redirection ──────────────────────
function showPodiumRedirect() {
  showScreen("podium");
  let n = 3;
  document.getElementById("countdown").textContent = n;
  const t = setInterval(() => {
    n--;
    document.getElementById("countdown").textContent = n;
    if (n <= 0) {
      clearInterval(t);
      location.href = "./podium.html";
    }
  }, 1000);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

init();
</script>
</body>
</html>
