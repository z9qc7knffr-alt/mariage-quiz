<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Affichage — Quiz Mariage</title>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #ffffff;
      --gold:   #c9a227;
      --gold2:  #e8cf6e;
      --ink:    #1d1d1f;
      --muted:  #8a8a86;
      --faint:  #c9c4b4;
      --surface:#fdfaf2;
      --border: #ece3c8;
      --green:  #1d8a4a;
      --radius: 16px;
    }
    html, body { height:100%; background:var(--bg); color:var(--ink); overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Attente ── */
    #s-wait {
      height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px; text-align:center; padding:40px;
    }
    .wait-ring {
      width:72px; height:72px; border-radius:50%;
      border:1.5px solid var(--border); border-top-color:var(--gold);
      animation:spin 1.4s linear infinite; margin-bottom:8px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .wait-title  { font-size:clamp(2rem,5vw,3.5rem); font-weight:700; letter-spacing:-1px; color:var(--ink); }
    .wait-sub    { font-size:clamp(1rem,2vw,1.4rem); color:var(--muted); margin-top:4px; }
    .wait-url-box {
      margin-top:24px; padding:20px 32px;
      border:1px solid var(--border); border-radius:var(--radius);
      background:var(--surface);
    }
    .wait-url-label { font-size:clamp(.8rem,1.5vw,1rem); color:var(--muted); margin-bottom:6px; }
    .wait-url-value { font-size:clamp(1rem,2.5vw,1.6rem); font-weight:600; letter-spacing:0.01em; color:var(--gold); }

    /* ── Question ── */
    #s-question {
      display:none; height:100vh;
      flex-direction:column; padding:clamp(20px,4vh,56px) clamp(24px,5vw,72px);
    }
    #s-question.visible { display:flex; }

    .q-topbar {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:clamp(16px,3vh,40px); flex-shrink:0; gap:16px;
    }
    .q-index {
      font-size:clamp(.8rem,1.6vw,1.1rem); font-weight:600;
      color:var(--gold); letter-spacing:0.04em; text-transform:uppercase;
    }
    .q-topbar-right { display:flex; align-items:center; gap:clamp(10px,2vw,20px); }
    .q-vote-count {
      font-size:clamp(.8rem,1.5vw,1rem); color:var(--muted);
    }
    .q-vote-count strong { color:var(--ink); }

    .q-timer {
      display:flex; align-items:center; gap:8px;
      font-size:clamp(1rem,2vw,1.4rem); font-weight:700;
      font-variant-numeric: tabular-nums;
      padding:clamp(6px,1vh,10px) clamp(14px,2vw,22px);
      border-radius:999px; background:var(--surface);
      border:1.5px solid var(--gold2); color:var(--ink);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .q-timer.urgent { background:#fdf0ee; border-color:#e0a194; color:#b8462f; }
    .q-timer-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); flex-shrink:0; }
    .q-timer.urgent .q-timer-dot { background:#b8462f; animation:blink 0.6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Bouton Suivante pour l'animateur */
    .btn-next-host {
      display:flex; align-items:center; gap:6px;
      padding:clamp(6px,1vh,10px) clamp(14px,2vw,20px);
      border-radius:999px; border:1.5px solid var(--gold);
      background:var(--gold); color:#fff;
      font-size:clamp(.8rem,1.5vw,1rem); font-weight:600;
      cursor:pointer; transition:opacity 0.15s, background 0.15s, border-color 0.15s; font-family:inherit;
    }
    .btn-next-host:active { opacity:0.7; }
    .btn-next-host svg { width:14px; height:14px; }
    .btn-next-host:disabled {
      background: var(--surface); border-color: var(--border); color: var(--muted);
      cursor: default; opacity: 1;
    }

    .q-progress-bar {
      height:3px; background:var(--border); border-radius:2px;
      margin-bottom:clamp(20px,4vh,48px); flex-shrink:0; overflow:hidden;
    }
    .q-progress-fill {
      height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px;
      transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* Layout une colonne : photo au-dessus des options si présente */
    .q-body { flex:1; display:flex; flex-direction:column; min-height:0; }

    .q-photo-top {
      width: 100%; flex-shrink: 0;
      margin-bottom: clamp(8px,1.2vh,16px);
      display: flex; align-items: center; justify-content: center;
    }
    .q-photo-display {
      max-height: clamp(220px,52vh,600px);
      max-width: 100%;
      object-fit: contain;
      border-radius: clamp(10px,1.5vw,18px);
      border: 1px solid var(--border);
    }
    .q-photo-skeleton {
      width: 100%; height: clamp(220px,52vh,600px);
      border-radius: clamp(10px,1.5vw,18px);
      background: var(--border);
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.5} }

    .q-text {
      font-size:clamp(1.6rem,4.5vw,3.5rem); font-weight:700;
      letter-spacing:-0.03em; line-height:1.15; color:var(--ink);
      margin-bottom:clamp(16px,3vh,40px); flex-shrink:0;
    }

    .opts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(4px,0.8vh,10px);
      width: 100%;
      max-width: clamp(500px, 80vw, 1000px);
      margin: 0 auto;
      align-content: start;
    }
    .opt-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:clamp(6px,0.9vh,10px) clamp(8px,1vw,14px);
      display:flex; flex-direction:column; gap:clamp(3px,0.5vh,6px);
      transition: border-color 0.3s, background 0.3s, opacity 0.4s ease, transform 0.4s ease;
    }

    /* Mauvaises réponses — disparaissent en fondu */
    .opt-card.fade-out {
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
    }

    /* Bonne réponse — s'étend et explose */
    .opt-card.expand-correct {
      grid-column: 1 / -1;
      border: 2.5px solid var(--green);
      background: #f0faf3;
      position: relative;
      overflow: visible;
      animation: expandIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      z-index: 2;
    }
    .opt-card.expand-correct .opt-badge {
      border-color: var(--green); background: var(--green); color: #fff;
      width: clamp(36px,4.5vw,58px); height: clamp(36px,4.5vw,58px);
      font-size: clamp(.9rem,1.8vw,1.35rem);
      animation: badgePop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .opt-card.expand-correct .opt-text {
      font-size: clamp(1.3rem,3vw,2.4rem);
      font-weight: 800;
      animation: textSlide 0.5s 0.25s ease both;
    }
    .opt-card.expand-correct .opt-bar-fill { background: var(--green); }

    /* Halo lumineux animé autour de la carte */
    .opt-card.expand-correct::before {
      content: "";
      position: absolute; inset: -6px;
      border-radius: 14px;
      background: transparent;
      box-shadow: 0 0 0 4px rgba(29,138,74,0.4), 0 0 40px 10px rgba(29,138,74,0.2);
      animation: haloGlow 1.2s 0.4s ease-out both;
      z-index: -1;
    }

    /* Étoiles scintillantes autour de la carte */
    .opt-card.expand-correct::after {
      content: "✦";
      position: absolute; top: -28px; right: 20px;
      font-size: clamp(1.2rem,2.5vw,2rem); color: var(--gold);
      animation: starPop 0.7s 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes expandIn {
      0%   { opacity:0;   transform: scale(0.85); }
      50%  { transform: scale(1.04); }
      100% { opacity:1;   transform: scale(1); }
    }
    @keyframes badgePop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    @keyframes textSlide {
      0%   { opacity:0; transform: translateX(-12px); }
      100% { opacity:1; transform: translateX(0); }
    }
    @keyframes haloGlow {
      0%   { opacity:0; box-shadow: 0 0 0 0px rgba(29,138,74,0), 0 0 0 0px rgba(29,138,74,0); }
      40%  { opacity:1; box-shadow: 0 0 0 6px rgba(29,138,74,0.5), 0 0 60px 20px rgba(29,138,74,0.3); }
      100% { opacity:1; box-shadow: 0 0 0 4px rgba(29,138,74,0.25), 0 0 30px 8px rgba(29,138,74,0.1); }
    }
    @keyframes starPop {
      0%   { opacity:0; transform: scale(0) rotate(-30deg); }
      60%  { opacity:1; transform: scale(1.4) rotate(10deg); }
      100% { opacity:1; transform: scale(1) rotate(0deg); }
    }

    .opt-correct-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: clamp(.8rem,1.4vw,1.1rem); font-weight: 700; color: var(--green);
      margin-top: 4px;
      animation: textSlide 0.5s 0.45s ease both; opacity:0;
    }
    .opt-card-top { display:flex; align-items:center; gap:clamp(6px,1vw,10px); }
    .opt-badge {
      width:clamp(22px,2.8vw,34px); height:clamp(22px,2.8vw,34px); border-radius:50%;
      border:1.5px solid var(--gold2);
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(.7rem,1.2vw,.95rem); font-weight:700; color:var(--gold);
      flex-shrink:0; background:#fff;
    }
    .opt-text { font-size:clamp(.8rem,1.6vw,1.2rem); font-weight:500; line-height:1.25; color:var(--ink); }
    .opt-bar-track { height:clamp(2px,0.4vh,4px); background:var(--border); border-radius:2px; overflow:hidden; }
    .opt-bar-fill  { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width .5s cubic-bezier(0.4,0,0.2,1); width:0%; }
    .opt-pct { font-size:clamp(.7rem,1.1vw,.85rem); color:var(--muted); text-align:right; }

    /* ── Transition podium ── */
    #s-podium {
      display:none; height:100vh;
      flex-direction:column; align-items:center; justify-content:center; gap:24px;
    }
    #s-podium.visible { display:flex; }
    .pod-title { font-size:clamp(2.5rem,6vw,5rem); font-weight:700; letter-spacing:-2px; color:var(--ink); }
    .pod-sub   { font-size:clamp(1rem,2vw,1.5rem); color:var(--muted); }
    .btn-podium-link {
      display: flex; align-items: center; gap: 10px;
      padding: clamp(14px,2vh,20px) clamp(28px,4vw,44px);
      border-radius: 999px; border: none;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      color: #fff; cursor: pointer; font-family: inherit;
      font-size: clamp(1rem,2vw,1.4rem); font-weight: 700;
      box-shadow: 0 8px 24px rgba(201,162,39,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-podium-link:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,162,39,0.35); }
    .btn-podium-link:active { transform: translateY(0); }
    .btn-podium-link svg { width: clamp(18px,2.5vw,24px); height: clamp(18px,2.5vw,24px); }

    /* ── Fade ── */
    .fade-out { animation:fo .35s ease forwards; }
    .fade-in  { animation:fi .35s ease forwards; }
    @keyframes fo { to { opacity:0; transform:scale(.98); } }
    @keyframes fi { from { opacity:0; transform:scale(.98); } }
  </style>
</head>
<body>

<!-- Attente -->
<div id="s-wait">
  <div class="wait-ring"></div>
  <div class="wait-title">Quiz du mariage</div>
  <div class="wait-sub">Le quiz commence bientôt…</div>
  <div class="wait-url-box">
    <div class="wait-url-label">Participez depuis votre téléphone</div>
    <div class="wait-url-value" id="game-url">—</div>
  </div>
</div>

<!-- Question -->
<div id="s-question">
  <div class="q-topbar">
    <div class="q-index" id="q-index">Question 1</div>
    <div class="q-topbar-right">
      <div class="q-vote-count">Votes : <strong id="vote-count">0</strong></div>
      <div class="q-timer" id="q-timer"><span class="q-timer-dot"></span><span id="q-timer-val">20s</span></div>
      <button class="btn-next-host" id="btn-next-host" onclick="goNext()" title="Passer à la question suivante">
        Suivante
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
  </div>
  <div class="q-progress-bar"><div class="q-progress-fill" id="q-pbar"></div></div>
  <div class="q-body" id="q-body">
    <div class="q-text" id="q-text"></div>
    <div class="q-photo-top" id="q-photo-top" style="display:none"></div>
    <div class="opts-grid" id="opts-grid"></div>
  </div>
</div>

<!-- Fin du quiz : bouton podium cliquable par le présentateur -->
<div id="s-podium">
  <div class="pod-title">Quiz terminé</div>
  <div class="pod-sub">Merci à tous les participants</div>
  <button class="btn-podium-link" onclick="goToPodium()">
    Afficher le podium
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>
  </button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const LETTERS = ["A","B","C","D","E","F"];

document.getElementById("game-url").textContent = location.href.replace("display.html","index.html");

let questions=[], currentQ=null, voteCounts={}, totalQ=0;
let countdownInterval=null;

function screen(name) {
  document.getElementById("s-wait").style.display     = name==="wait"    ?"flex":"none";
  document.getElementById("s-question").classList.toggle("visible", name==="question");
  document.getElementById("s-podium").style.display   = name==="podium"  ?"flex":"none";
}

async function init() {
  const {data:qs} = await sb.from("quiz_questions").select("*").order("position");
  questions=qs||[]; totalQ=questions.length;
  const {data:state} = await sb.from("quiz_state").select("*").eq("id",1).single();
  if (state) await handleState(state, false);

  sb.channel("d_state")
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"quiz_state",filter:"id=eq.1"}, p=>handleState(p.new,true))
    .subscribe();
  sb.channel("d_votes")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"quiz_votes"}, p=>{
      const {question_id,answer_index}=p.new;
      if(!voteCounts[question_id]) voteCounts[question_id]={};
      voteCounts[question_id][answer_index]=(voteCounts[question_id][answer_index]||0)+1;
      if(currentQ?.id===question_id) updateBars();
    }).subscribe();
}

async function handleState(state, animate) {
  clearInterval(countdownInterval);
  if (state.status==="waiting") { screen("wait"); return; }
  if (state.status==="podium"||state.status==="done") { showPodiumLink(); return; }
  if (state.status==="question") {
    const idx=state.current_question_index, q=questions[idx];
    if (!q) return;
    if (!voteCounts[q.id]) {
      const {data:ev} = await sb.from("quiz_votes").select("answer_index").eq("question_id",q.id);
      voteCounts[q.id]={};
      (ev||[]).forEach(v=>{ voteCounts[q.id][v.answer_index]=(voteCounts[q.id][v.answer_index]||0)+1; });
    }
    if (animate && currentQ && currentQ.id!==q.id) {
      const el=document.getElementById("s-question");
      el.classList.add("fade-out"); await sleep(320); el.classList.remove("fade-out");
      renderQ(q,idx,state); el.classList.add("fade-in"); await sleep(320); el.classList.remove("fade-in");
    } else { renderQ(q,idx,state); }
    screen("question");
  }
}

function renderQ(q, idx, state) {
  currentQ=q;
  document.getElementById("q-index").textContent = `Question ${idx+1} / ${totalQ}`;
  document.getElementById("q-pbar").style.width  = totalQ>0 ? Math.round((idx+1)/totalQ*100)+"%" : "0%";
  document.getElementById("q-text").textContent  = q.text;

  // Le bouton "Suivante" est désactivé par défaut — il ne devient cliquable
  // qu'à l'expiration du décompte (voir tick() / revealCorrectAnswer)
  const nextBtn = document.getElementById("btn-next-host");
  nextBtn.style.visibility = "visible";
  nextBtn.disabled = true;

  // Si une photo est associée : masquer le texte, afficher la photo AU-DESSUS des options
  // Sinon : afficher le texte normalement, masquer la zone photo
  const qTextEl  = document.getElementById("q-text");
  const photoTop = document.getElementById("q-photo-top");

  if (q.photo_url) {
    qTextEl.style.display  = "none";   // texte masqué côté public
    photoTop.style.display = "flex";
    photoTop.innerHTML = `<div class="q-photo-skeleton" id="dsk"></div>`;
    const img = new Image();
    img.className = "q-photo-display";
    img.alt       = "illustration";
    img.onload  = () => { const sk=document.getElementById("dsk"); if(sk) sk.replaceWith(img); };
    img.onerror = () => { qTextEl.style.display="block"; photoTop.style.display="none"; photoTop.innerHTML=""; };
    img.src = q.photo_url;
  } else {
    qTextEl.style.display  = "block";  // texte visible si pas de photo
    photoTop.style.display = "none";
    photoTop.innerHTML = "";
  }

  document.getElementById("opts-grid").innerHTML = q.options.map((o,j)=>`
    <div class="opt-card" id="oc-${j}">
      <div class="opt-card-top">
        <div class="opt-badge">${LETTERS[j]}</div>
        <div class="opt-text">${o}</div>
      </div>
      <div class="opt-bar-track"><div class="opt-bar-fill" id="ob-${j}"></div></div>
      <div class="opt-pct" id="op-${j}">—</div>
    </div>`).join("");
  updateBars();

  // ── Décompte synchronisé ──────────────────────────────────────
  const durationSec = state?.question_duration_sec || 20;
  const startedAt    = state?.question_started_at ? new Date(state.question_started_at).getTime() : Date.now();
  let answerRevealed = false;

  function revealCorrectAnswer() {
    if (answerRevealed) return;
    answerRevealed = true;

    // Activer le bouton Suivante
    const nextBtn = document.getElementById("btn-next-host");
    if (nextBtn) nextBtn.disabled = false;

    const correctIdx = q.correct_answer_index;

    // ── Étape 1 (immédiat) : fade out des mauvaises réponses ──
    q.options.forEach((_, j) => {
      if (j !== correctIdx) {
        document.getElementById(`oc-${j}`)?.classList.add("fade-out");
      }
    });

    // ── Étape 2 (420ms) : expand de la bonne réponse ──
    setTimeout(() => {
      q.options.forEach((_, j) => {
        if (j !== correctIdx) {
          const card = document.getElementById(`oc-${j}`);
          if (card) card.style.display = "none";
        }
      });

      const correct = document.getElementById(`oc-${correctIdx}`);
      if (correct) {
        correct.classList.add("expand-correct");
        if (!correct.querySelector(".opt-correct-tag")) {
          const tag = document.createElement("div");
          tag.className = "opt-correct-tag";
          tag.textContent = "✓ Bonne réponse";
          correct.appendChild(tag);
        }
      }
    }, 420);

    // ── Étape 3 (700ms) : explosion de confettis multi-vagues ──
    setTimeout(() => {
      const colors = ["#c9a227", "#e8cf6e", "#1d8a4a", "#ffffff", "#f5e6a3"];

      // Vague 1 — explosion centrale
      confetti({
        particleCount: 120,
        spread: 80,
        origin: { x: 0.5, y: 0.55 },
        colors,
        scalar: 1.2,
        zIndex: 9999,
      });

      // Vague 2 (150ms) — gerbe depuis la gauche
      setTimeout(() => confetti({
        particleCount: 60,
        angle: 60,
        spread: 70,
        origin: { x: 0, y: 0.6 },
        colors,
        zIndex: 9999,
      }), 150);

      // Vague 3 (150ms) — gerbe depuis la droite
      setTimeout(() => confetti({
        particleCount: 60,
        angle: 120,
        spread: 70,
        origin: { x: 1, y: 0.6 },
        colors,
        zIndex: 9999,
      }), 150);

      // Vague 4 (500ms) — pluie dorée depuis le haut
      setTimeout(() => confetti({
        particleCount: 80,
        spread: 120,
        startVelocity: 20,
        gravity: 0.6,
        origin: { x: 0.5, y: 0 },
        colors: ["#c9a227", "#e8cf6e", "#f5e6a3", "#fff"],
        shapes: ["square"],
        scalar: 0.8,
        zIndex: 9999,
      }), 500);

      // Vague 5 (900ms) — rafale finale
      setTimeout(() => confetti({
        particleCount: 50,
        spread: 60,
        origin: { x: 0.5, y: 0.5 },
        colors,
        startVelocity: 35,
        zIndex: 9999,
      }), 900);

    }, 700);
  }

  function tick() {
    const elapsed   = (Date.now() - startedAt) / 1000;
    const remaining = Math.max(0, Math.ceil(durationSec - elapsed));
    const timerEl  = document.getElementById("q-timer");
    const timerVal = document.getElementById("q-timer-val");
    if (timerVal) timerVal.textContent = remaining + "s";
    if (timerEl)  timerEl.classList.toggle("urgent", remaining <= 5);
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      revealCorrectAnswer();
    }
  }
  tick();
  countdownInterval = setInterval(tick, 250);
}

function updateBars() {
  if (!currentQ) return;
  const counts=voteCounts[currentQ.id]||{};
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  document.getElementById("vote-count").textContent=total;
  currentQ.options.forEach((_,j)=>{
    const c=counts[j]||0, pct=total>0?Math.round(c/total*100):0;
    const b=document.getElementById(`ob-${j}`), l=document.getElementById(`op-${j}`);
    if(b) b.style.width=pct+"%";
    if(l) l.textContent=total>0?pct+"%":"—";
  });
}

function showPodiumLink() {
  screen("podium");
}

window.goToPodium = () => { location.href = "./podium.html"; };

// ── Contrôle animateur : passer à la question suivante depuis l'écran public ──
window.goNext = async () => {
  const { data: state } = await sb.from("quiz_state").select("current_question_index").eq("id",1).single();
  if (!state) return;
  const nextIdx = state.current_question_index + 1;
  const payload = nextIdx >= totalQ
    ? { status: "done", current_question_index: nextIdx }
    : { status: "question", current_question_index: nextIdx, question_started_at: new Date().toISOString() };
  await sb.from("quiz_state").update(payload).eq("id",1);
};

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
init();
</script>
